import duckdb
import os

def descoberta_total():
    print("🔎 INICIANDO VARREDURA COMPLETA DO PBF (SEM FILTROS)")
    
    con = duckdb.connect()
    con.execute("SET extension_directory='./duckdb_ext';")
    con.execute("INSTALL spatial; LOAD spatial;")
    
    pbf_path = "sudeste.osm.pbf"
    
    if not os.path.exists(pbf_path):
        print("❌ Arquivo não encontrado.")
        return

    # 1. DESCOBRINDO O DICIONÁRIO DE CHAVES (TUDO O QUE EXISTE)
    print("\n--- 📚 DICIONÁRIO DE TODAS AS KEYS PRESENTES ---")
    # Este comando 'desembrulha' o mapa de tags e lista as chaves mais comuns
    try:
        query_keys = f"""
            SELECT 
                key, 
                count(*) as frequencia
            FROM (
                SELECT unnest(map_keys(tags)) as key 
                FROM ST_Read('{pbf_path}')
            ) 
            GROUP BY key 
            ORDER BY frequencia DESC 
            LIMIT 50
        """
        keys_df = con.execute(query_keys).pl()
        print(keys_df)
    except Exception as e:
        print(f"Erro na varredura de chaves: {e}")

    # 2. AMOSTRAGEM BRUTA DE REGISTROS
    print("\n--- 🧪 AMOSTRA BRUTA (OS PRIMEIROS 10 REGISTROS DO ARQUIVO) ---")
    try:
        # Mostra o ID, nome e o mapa completo de tags para você ver a estrutura
        raw_sample = con.execute(f"SELECT osm_id, name, tags FROM ST_Read('{pbf_path}') LIMIT 10").pl()
        print(raw_sample)
    except Exception as e:
        print(f"Erro na amostragem: {e}")

if __name__ == "__main__":
    descoberta_total()
