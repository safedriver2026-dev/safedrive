name: Discovery SafeDriver OSM
on:
  workflow_dispatch:

jobs:
  discovery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Tools
        run: pip install duckdb polars

      - name: Download Real PBF
        run: |
          # O segredo é o -L e o User-Agent
          wget -L --user-agent="Mozilla/5.0" https://download.geofabrik.de/south-america/brazil/sudeste-latest-free.osm.pbf -O data.osm.pbf
          ls -lh data.osm.pbf # Aqui tem que aparecer ~800MB no log

      - name: Deep Discovery Script
        run: python scripts/discovery.py

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: osm-dictionary-report
          path: reports/
