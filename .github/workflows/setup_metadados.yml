name: Debug & Ingest OSM
on:
  workflow_dispatch: # Permite que você rode manualmente pelo botão no GitHub

jobs:
  debug_osm:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install duckdb polars pyarrow

      - name: Download OSM PBF (Sudeste)
        run: |
          # Baixando direto do Geofabrik para o runner
          curl -L https://download.geofabrik.de/south-america/brazil/sudeste-latest-free.osm.pbf -o sudeste.osm.pbf

      - name: Run Diagnostic & Metadata Extraction
        run: python scripts/debug_osm_pbf.py
