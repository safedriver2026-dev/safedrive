name: 🚀 Enriquecimento e Migração de Malha

on:
  workflow_dispatch:

jobs:
  process-geo:
    runs-on: ubuntu-latest
    env:
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Deps
        run: pip install polars duckdb boto3

      - name: Run Pipeline
        run: python autobot/enriquece_malha_final.py
