name: Pipeline Geografico e Contextual

on:
  workflow_dispatch:

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  construir-e-enriquecer:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1 - Checkout do Codigo
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Passo 3 - Instalar Dependencias
        run: pip install polars duckdb boto3 pyarrow requests h3

      - name: Passo 4 - Fase 1: Enriquecimento IBGE
        run: python autobot/enriquece_malha_final.py

      - name: Passo 5 - Fase 2: Enriquecimento OSM
        run: python autobot/processa_osm_completo.py
