name:  Enriquecimento e Migração (Malha Geográfica)

on:
  workflow_dispatch:

# Credenciais movidas para o nível global para evitar erros de sintaxe no Job
env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  job-enriquecimento:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1: Obter o Código (Checkout)
        uses: actions/checkout@v4

      - name: Passo 2: Configurar Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Passo 3: Instalar Dependências
        run: pip install polars duckdb boto3

      - name: Passo 4: Executar Script de Enriquecimento e Migração
        run: python autobot/enriquece_malha_final.py
