name: Auditoria de Reconciliação Geográfica

on:
  workflow_dispatch:

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  auditoria-comparativa:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1 - Checkout
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Passo 3 - Instalar Dependências
        run: pip install polars duckdb boto3 pyarrow

      - name: Passo 4 - Download dos SHP e Parquet (Landing Zone)
        run: |
          python -c "
          import boto3, os
          s3 = boto3.client('s3', 
                            endpoint_url=os.getenv('R2_ENDPOINT_URL').strip(), 
                            aws_access_key_id=os.getenv('R2_ACCESS_KEY_ID').strip(), 
                            aws_secret_access_key=os.getenv('R2_SECRET_ACCESS_KEY').strip())
          
          bucket = os.getenv('R2_BUCKET_NAME').strip()
          
          # Baixa a Malha Mestra para comparar
          s3.download_file(bucket, 'malha geografica/malha_mestra_consolidada_2025.parquet', 'malha_mestra.parquet')
          
          # Baixa o Shapefile original (assumindo que você subiu como zip)
          s3.download_file(bucket, 'malha geografica/setores_ibge_sp.zip', 'setores_originais.zip')
          "
          unzip -q setores_originais.zip -d shp_original

      - name: Passo 5 - Executar Auditoria de Confronto
        run: python autobot/auditoria_comparativa.py
