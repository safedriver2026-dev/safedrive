name: Auditoria de Qualidade Bronze

on:
  workflow_dispatch: # Execução manual para conferência rápida
  workflow_run:
    workflows: ["Processamento e Organização Bronze"]
    types: [completed] # Roda automaticamente após o processamento terminar

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  qa-audit:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: 1. Checkout do código
        uses: actions/checkout@v4

      - name: 2. Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 3. Instalar dependências de Auditoria
        run: |
          pip install polars boto3 pyarrow

      - name: 4. Executar Auditoria Técnica
        run: python autobot/auditoria_bronze.py
