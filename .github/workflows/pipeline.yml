name: Pipeline do SafeDriver

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  telemetria_multi_modal:
    name: Inteligencia de Dados (Padrao Google Maps)
    runs-on: ubuntu-latest

    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Bibliotecas
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pygeohash openpyxl requests firebase-admin

      - name: Executar Motor Multi-Modal
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: |
          python motor_safedriver.py

      - name: Salvar Artefato (Power BI)
        uses: actions/upload-artifact@v4
        with:
          name: base-powerbi
          path: dados_publicos_safedriver.csv
