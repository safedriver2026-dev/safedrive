name: Autobot SafeDriver - Operacao Semanal

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

jobs:
  autobot-safedriver:
    name: Autobot SafeDriver - Missao Semanal
    runs-on: ubuntu-latest

    env:
      # Canais do Autobot (Discord)
      DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
      DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}

      # Nucleo Cloud
      FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
      FIRESTORE_COLLECTION_RISK: "risk_cells_v2"

      # Data Lake (cache Parquet)
      LAKE_DIR: "data_lake"
      STATE_DIR: "state"
      MODEL_DIR: "modelos"
      PARQUET_ENGINE: "pyarrow"
      PARQUET_COMPRESSION: "zstd"

      # SSP (atualizacao inteligente)
      SSP_FORCE_REFRESH: "0"

      # Malha do App
      GEOHASH_PRECISION_APP: "7"

      # XGBoost (treino economico)
      XGB_ALPHA: "0.6"
      MIN_NOVOS_BO_TREINO: "200"
      TREINO_COOLDOWN_H: "24"
      TRAIN_WINDOW_MONTHS: "24"
      XGB_MAX_ROWS: "50000"
      XGB_MAX_DEPTH: "4"
      XGB_MAX_BIN: "128"
      XGB_NUM_BOOST_ROUND: "1200"
      XGB_EARLY_STOP: "50"

      # Prophet (hotspots)
      PROPHET_HORIZON_DIAS: "7"
      PROPHET_TOP_GEOHASH: "20"
      PROPHET_MIN_POINTS: "14"

    steps:
      - name: Capturar repositorio (checkout)
        uses: actions/checkout@v4

      - name: Preparar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Restaurar memoria do Autobot (cache do data lake, modelos e estado)
        uses: actions/cache@v4
        with:
          path: |
            data_lake
            modelos
            state
          key: autobot-safedriver-${{ runner.os }}-${{ github.ref }}-${{ github.run_id }}
          restore-keys: |
            autobot-safedriver-${{ runner.os }}-${{ github.ref }}-
            autobot-safedriver-${{ runner.os }}-

      - name: Instalar dependencias Python
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          if [ -f requirements-dev.txt ]; then pip install -r requirements-dev.txt; fi

      - name: Verificacao de integridade (pytest)
        id: testes
        run: |
          python -m pytest -q

      - name: Executar Motor SafeDriver (cache + malha + firestore + metricas)
        id: motor
        if: success()
        run: |
          python motor_safedriver.py

      - name: Executar Prophet (previsoes + metricas)
        id: prophet
        if: success()
        run: |
          python forecast_prophet.py

      - name: Alerta - testes falharam
        if: failure() && steps.testes.outcome == 'failure' && env.DISCORD_ERRO != ''
        shell: bash
        run: |
          payload=$(cat <<'JSON'
          {"content":"ALERTA (Autobot SafeDriver): falha na verificacao de integridade (pytest). Missao abortada. Verifique os logs do GitHub Actions."}
          JSON
          )
          curl -sS -X POST "$DISCORD_ERRO" -H "Content-Type: application/json" -d "$payload"

      - name: Alerta - motor falhou
        if: failure() && steps.testes.outcome == 'success' && steps.motor.outcome == 'failure' && env.DISCORD_ERRO != ''
        shell: bash
        run: |
          payload=$(cat <<'JSON'
          {"content":"ALERTA (Autobot SafeDriver): falha no motor (motor_safedriver.py). Missao interrompida. Verifique os logs do GitHub Actions."}
          JSON
          )
          curl -sS -X POST "$DISCORD_ERRO" -H "Content-Type: application/json" -d "$payload"

      - name: Alerta - prophet falhou
        if: failure() && steps.testes.outcome == 'success' && steps.motor.outcome == 'success' && steps.prophet.outcome == 'failure' && env.DISCORD_ERRO != ''
        shell: bash
        run: |
          payload=$(cat <<'JSON'
          {"content":"ALERTA (Autobot SafeDriver): falha no nucleo Prophet (forecast_prophet.py). O motor concluiu, mas as previsoes nao foram geradas. Verifique os logs do GitHub Actions."}
          JSON
          )
          curl -sS -X POST "$DISCORD_ERRO" -H "Content-Type: application/json" -d "$payload"

      - name: Confirmacao final - missao concluida
        if: success() && env.DISCORD_SUCESSO != ''
        shell: bash
        run: |
          payload=$(cat <<'JSON'
          {"content":"OK (Autobot SafeDriver): missao semanal concluida. Cache Parquet atualizado, malha publicada no Firestore e Prophet executado (quando aplicavel). Resumos executivos enviados pelo Autobot."}
          JSON
          )
          curl -sS -X POST "$DISCORD_SUCESSO" -H "Content-Type: application/json" -d "$payload"
