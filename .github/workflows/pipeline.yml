name: Pipeline SafeDriver

on:
  schedule:
    # Executa automaticamente nos dias 1 e 15 de cada mes, a meia-noite (UTC)
    - cron: '0 0 1,15 * *'
  workflow_dispatch: 

jobs:
  processamento_de_dados:
    name: Processamento de Dados da SSP-SP
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o Repositorio do Projeto
        uses: actions/checkout@v4

      - name: Configurar o Ambiente Python (Versao 3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar as Bibliotecas e Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pygeohash openpyxl requests firebase-admin

      - name: Executar o Motor de Inteligencia (XGBoost / Regras Penais)
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          python motor_safedriver.py

      - name: Exportar Base de Dados Limpa para o Power BI
        uses: actions/upload-artifact@v4
        with:
          name: base-analitica-powerbi
          path: dados_publicos_safedriver.csv
