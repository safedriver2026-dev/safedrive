name: Pipeline SafeDriver

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  processamento_de_dados:
    name: Processamento de Dados da SSP-SP
    runs-on: ubuntu-latest

    steps:
      - name: Clonar o Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pygeohash openpyxl requests firebase-admin

      - name: Executar Motor e Sincronizar Firestore
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: |
          python motor_safedriver.py

      - name: Gerar Artefato CSV para Power BI
        uses: actions/upload-artifact@v4
        with:
          name: base-analitica-powerbi
          path: dados_publicos_safedriver.csv
