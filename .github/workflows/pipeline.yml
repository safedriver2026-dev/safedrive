name: SafeDriver Auto-Pilot

on:
  schedule:
    - cron: '0 3 1 * *' # Todo dia 1 às 03:00 AM
  workflow_dispatch:      

jobs:
  ia-e-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write 
    steps:
      - name: 1. Checkout Código
        uses: actions/checkout@v4

      - name: 2. Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: 3. Instalar Libs
        run: pip install -r requirements.txt

      - name: 4. Executar Motor
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: python motor_safedriver.py

      - name: 5. Auto-Update Data Link (Push back to Repo)
        run: |
          git config --global user.name "SafeDriver Bot"
          git config --global user.email "bot@safedriver.ai"
          git add dados_publicos_safedriver.csv
          git commit -m "📊 Dados atualizados automaticamente [Skip CI]" || exit 0
          git push

      - name: 6. Discord Notificação
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            URL="${{ secrets.DISCORD_SUCCESS_WEBHOOK }}"
            MSG="✅ **SafeDriver:** Motor rodou! Power BI e App atualizados."
          else
            URL="${{ secrets.DISCORD_ERROR_WEBHOOK }}"
            MSG="❌ **SafeDriver:** Erro na pipeline! Verifique o GitHub."
          fi
          curl -X POST -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
