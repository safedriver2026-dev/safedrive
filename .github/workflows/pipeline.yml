name: AutoBot SafeDriver

on:
  schedule:
    - cron: '0 0 1,15 * *'
  workflow_dispatch:

jobs:
  telemetria_automatica:
    name: Execução Automática AutoBot
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          pip install pandas numpy pygeohash openpyxl requests firebase-admin

      - name: Rodar AutoBot
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: |
          python motor_safedriver.py

      - name: Upload da Base (Power BI)
        uses: actions/upload-artifact@v4
        with:
          name: base-autobot
          path: dados_publicos_safedriver.csv
