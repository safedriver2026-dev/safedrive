name: SafeDriver Engine Pipeline

on:
  schedule:
    # Executa automaticamente nos dias 1 e 15 de cada mes a meia-noite
    - cron: '0 0 1,15 * *'
  workflow_dispatch: 

jobs:
  processar_dados:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Repositorio
        uses: actions/checkout@v3

      - name: Configurar Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas numpy pygeohash openpyxl requests firebase-admin

      - name: Executar Motor SafeDriver
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: |
          python motor_safedriver.py

      - name: Salvar Dados Analiticos
        uses: actions/upload-artifact@v3
        with:
          name: relatorio-powerbi
          path: dados_publicos_safedriver.csv
