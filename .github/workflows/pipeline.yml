name: Autobot SafeDriver

on:
  schedule:
    - cron: "0 0 * * 1"
  workflow_dispatch: {}

jobs:
  safedrive-weekly:
    runs-on: ubuntu-latest

    env:
      DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
      DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
      FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}

      LAKE_DIR: "data_lake"
      PARQUET_ENGINE: "pyarrow"
      PARQUET_COMPRESSION: "zstd"
      SSP_FORCE_REFRESH: "0"

      GEOHASH_PRECISION_APP: "7"
      FIRESTORE_COLLECTION_RISK: "risk_cells_v2"

      XGB_ALPHA: "0.6"
      MIN_NOVOS_BO_TREINO: "200"
      TREINO_COOLDOWN_H: "24"
      TRAIN_WINDOW_MONTHS: "24"
      XGB_MAX_ROWS: "50000"
      XGB_MAX_DEPTH: "4"
      XGB_MAX_BIN: "128"
      XGB_NUM_BOOST_ROUND: "1200"
      XGB_EARLY_STOP: "50"

      PROPHET_HORIZON_DIAS: "7"
      PROPHET_TOP_GEOHASH: "20"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache lake + models + state
        uses: actions/cache@v4
        with:
          path: |
            data_lake
            modelos
            state
          key: safedrive-${{ runner.os }}-${{ github.ref }}-${{ github.run_id }}
          restore-keys: |
            safedrive-${{ runner.os }}-${{ github.ref }}-
            safedrive-${{ runner.os }}-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run tests (pytest)
        id: tests
        run: |
          pytest -q

      - name: Run SafeDriver weekly pipeline
        id: pipeline
        if: success()
        run: |
          python motor_safedriver.py

      - name: Run Prophet forecasts for BI
        id: prophet
        if: success()
        run: |
          python forecast_prophet.py

      - name: Notify Discord - tests failed
        if: failure() && steps.tests.outcome == 'failure' && env.DISCORD_ERRO != ''
        run: |
          curl -X POST "$DISCORD_ERRO" \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ SafeDrive semanal: testes falharam. Verifique o GitHub Actions."}'

      - name: Notify Discord - pipeline failed
        if: failure() && steps.tests.outcome == 'success' && steps.pipeline.outcome == 'failure' && env.DISCORD_ERRO != ''
        run: |
          curl -X POST "$DISCORD_ERRO" \
            -H "Content-Type: application/json" \
            -d '{"content": "❌ SafeDrive semanal: motor_safedriver.py falhou. Verifique os logs."}'

      - name: Notify Discord - all good
        if: success() && env.DISCORD_SUCESSO != ''
        run: |
          curl -X POST "$DISCORD_SUCESSO" \
            -H "Content-Type: application/json" \
            -d '{"content": "✅ SafeDrive: sync semanal executado com sucesso (caches parquet + malha + Prophet)."}'
