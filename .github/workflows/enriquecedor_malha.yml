name: Enriquecimento de Malha Estadual

on:
  workflow_dispatch:

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  processamento-geografico:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1 - Checkout do codigo
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Passo 3 - Instalar bibliotecas
        run: pip install polars duckdb boto3 pyarrow h3

      - name: Passo 4 - Download e Extração (Via Sistema)
        run: |
          echo "📥 Baixando base estadual da Geofabrik..."
          wget -q https://download.geofabrik.de/south-america/brazil/sao-paulo-latest-free.shp.zip -O sp_data.zip
          echo "unzipping..."
          unzip -q sp_data.zip -d temp_estadual
          rm sp_data.zip
          echo "✅ Download e extração concluídos."

      - name: Passo 5 - Processamento Pesado (Python)
        run: python autobot/processa_osm_completo.py
