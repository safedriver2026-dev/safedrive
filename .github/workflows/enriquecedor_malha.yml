name: Processamento e Organização Bronze

on:
  workflow_dispatch: # Permite execução manual pelo console do GitHub

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  build-bronze:
    runs-on: ubuntu-latest
    timeout-minutes: 60 # Garante tempo suficiente para o processamento pesado

    steps:
      - name: Passo 1 - Checkout do Repositório
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Passo 3 - Instalar Bibliotecas Necessárias
        run: |
          pip install polars duckdb boto3 pyarrow h3 requests

      - name: Passo 4 - Download Resiliente do OSM (SP/Sudeste)
        run: |
          python -c "
          import requests, sys, os, zipfile

          def baixar(url, nome):
              print(f'📡 Conectando a: {url}')
              headers = {'User-Agent': 'Mozilla/5.0'}
              try:
                  with requests.get(url, headers=headers, stream=True, timeout=120) as r:
                      r.raise_for_status()
                      with open(nome, 'wb') as f:
                          for chunk in r.iter_content(chunk_size=1024*1024): f.write(chunk)
                  
                  tamanho_mb = os.path.getsize(nome) / (1024*1024)
                  if tamanho_mb > 50 and zipfile.is_zipfile(nome):
                      print(f'✅ Download concluído: {tamanho_mb:.2f} MB')
                      return True
                  return False
              except Exception as e:
                  print(f'⚠️ Erro: {e}')
                  return False

          url_sp = 'https://download.geofabrik.de/south-america/brazil/sao-paulo-latest-free.shp.zip'
          url_se = 'https://download.geofabrik.de/south-america/brazil/sudeste-latest-free.shp.zip'

          if not baixar(url_sp, 'dados_osm.zip'):
              print('🔄 Tentando Fallback para base regional Sudeste...')
              if not baixar(url_se, 'dados_osm.zip'):
                  print('🚨 Erro crítico: Fontes Geofabrik indisponíveis.')
                  sys.exit(1)
          "

      - name: Passo 5 - Extração e Limpeza de Temporários
        run: |
          echo "📂 Extraindo Shapefiles..."
          unzip -q dados_osm.zip -d temp_estadual
          rm dados_osm.zip
          echo "✅ Arquivos extraídos com sucesso."

      - name: Passo 6 - Executar Organização Bronze e Inspeção de Dados
        run: python autobot/organiza_bronze.py
