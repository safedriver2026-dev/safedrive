- name: Passo 4 - Download Inteligente com Fallback e Diagnóstico
        run: |
          python -c "
          import requests, sys, os, zipfile
          
          def validar_e_baixar(url, nome):
              print(f'📡 Tentando baixar de: {url}')
              h = {'User-Agent': 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'}
              try:
                  r = requests.get(url, headers=h, stream=True, timeout=60)
                  with open(nome, 'wb') as f:
                      for chunk in r.iter_content(chunk_size=1024*1024): f.write(chunk)
                  
                  size_kb = os.path.getsize(nome) / 1024
                  print(f'📊 Tamanho baixado: {size_kb:.2f} KB')
                  
                  # Validação Real: É um ZIP e tem um tamanho mínimo (SP tem > 500MB)
                  if zipfile.is_zipfile(nome) and size_kb > 1000:
                      print('✅ ZIP válido detectado!')
                      return True
                  else:
                      print('⚠️ Arquivo inválido ou bloqueado pelo servidor.')
                      return False
              except Exception as e:
                  print(f'❌ Erro na conexão: {e}')
                  return False

          url_sp = 'https://download.geofabrik.de/south-america/brazil/sao-paulo-latest-free.shp.zip'
          url_sudeste = 'https://download.geofabrik.de/south-america/brazil/sudeste-latest-free.shp.zip'

          # TENTATIVA 1: SÃO PAULO
          if not validar_e_baixar(url_sp, 'dados_osm.zip'):
              print('🔄 Iniciando Fallback: Tentando região SUDESTE...')
              # TENTATIVA 2: SUDESTE
              if not validar_e_baixar(url_sudeste, 'dados_osm.zip'):
                  print('🚨 [DIAGNÓSTICO] Ambas as fontes falharam. Expondo conteúdo do erro:')
                  with open('dados_osm.zip', 'r', encoding='utf-8', errors='ignore') as f:
                      print(f.read()[:1000]) # Mostra os primeiros 1000 caracteres do erro
                  sys.exit(1)
          "
