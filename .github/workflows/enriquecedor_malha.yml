name: Enriquecimento de Malha Estadual

on:
  workflow_dispatch:

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  processamento-geografico:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1 - Checkout do codigo
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Passo 3 - Instalar bibliotecas
        run: pip install polars duckdb boto3 pyarrow h3 requests

      - name: Passo 4 - Download Inteligente (SP ou Sudeste)
        run: python autobot/downloader_resiliente.py

      - name: Passo 5 - Unzip via Sistema
        run: |
          unzip -q dados_osm.zip -d temp_estadual
          rm dados_osm.zip
          echo "✅ Extração concluída."

      - name: Passo 6 - Processamento e Filtro SP (Python)
        run: python autobot/processa_osm_completo.py
