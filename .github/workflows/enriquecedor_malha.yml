name: Processamento e Organização Bronze

on:
  workflow_dispatch: # Permite que você rode manualmente pelo painel do GitHub

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  build-bronze:
    runs-on: ubuntu-latest

    steps:
      - name: Passo 1 - Checkout do Código
        uses: actions/checkout@v4

      - name: Passo 2 - Configurar Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Passo 3 - Instalar Dependências de Engenharia
        run: |
          pip install polars duckdb boto3 pyarrow h3 requests

      - name: Passo 4 - Download Resiliente do OSM (SP com Fallback)
        run: |
          python -c "
          import requests, sys, os
          def download(url, name):
              print(f'📡 Tentando download: {url}')
              h = {'User-Agent': 'Mozilla/5.0'}
              try:
                  with requests.get(url, headers=h, stream=True, timeout=60) as r:
                      if r.status_code == 200:
                          with open(name, 'wb') as f:
                              for chunk in r.iter_content(chunk_size=1024*1024): f.write(chunk)
                          return True
              except: return False
              return False

          url_sp = 'https://download.geofabrik.de/south-america/brazil/sao-paulo-latest-free.shp.zip'
          url_sudeste = 'https://download.geofabrik.de/south-america/brazil/sudeste-latest-free.shp.zip'

          if download(url_sp, 'dados_osm.zip'):
              print('✅ Base de São Paulo obtida.')
          elif download(url_sudeste, 'dados_osm.zip'):
              print('✅ Base do Sudeste obtida (Fallback).')
          else:
              print('❌ Erro: Fontes indisponíveis.'); sys.exit(1)
          "

      - name: Passo 5 - Extração dos Arquivos Geográficos
        run: |
          echo "📂 Extraindo Shapefiles do OSM..."
          unzip -q dados_osm.zip -d temp_estadual
          rm dados_osm.zip

      - name: Passo 6 - Executar Enriquecimento e Organização Bronze
        run: python autobot/organiza_bronze.py
