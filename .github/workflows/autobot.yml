name: Missao Diaria Autobot SafeDriver

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 3 * * *'

jobs:
  execucao:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Cache Data Lake
      uses: actions/cache@v3
      with:
        path: datalake
        key: ${{ runner.os }}-datalake-${{ hashFiles('datalake/bruto/*.parquet') }}
        restore-keys: |
          ${{ runner.os }}-datalake-

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy requests firebase-admin h3 prophet xgboost scikit-learn fastparquet openpyxl

    - name: Run Tests
      run: pytest tests/test_contracts.py -v

    - name: Run Autobot
      env:
        FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
      run: python autobot/autobot_engine.py
