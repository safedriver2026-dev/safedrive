name: SafeDriver_Elite_Pipeline

on:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [ main ]

jobs:
  execucao:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sincronizar Repositório
        uses: actions/checkout@v4

      - name: Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Infraestrutura
        run: |
          pip install pandas pyarrow openpyxl requests xgboost lightgbm catboost folium scikit-learn google-genai shap h3
          pip install -e .

      - name: Operar Motor (50% Capacidade)
        env:
          GEMINI_JSON: ${{ secrets.GEMINI_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python -c "from autobot.autobot_engine import MotorSafeDriver; MotorSafeDriver().gerenciar_ciclo_vida()"

      - name: Persistir Camadas Ouro e Prata
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Sistema: Sincronização Delta e Ativos IA [skip ci]"
          file_pattern: "datalake/camada_ouro_refinada/* controle_delta.json"
