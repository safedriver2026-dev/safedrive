name: Fluxo Semanal SafeDriver
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
jobs:
  sincronizacao:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - uses: actions/cache@v4
        with:
          path: datalake/
          key: safedriver-dl-${{ runner.os }}-${{ hashFiles('datalake/metadata/*.json') }}
          restore-keys: |
            safedriver-dl-${{ runner.os }}-
      - run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - run: python -m pytest tests/test_contracts.py -q
      - env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python -m autobot.autobot_engine
      - uses: actions/upload-artifact@v4
        with:
          name: reports
          path: datalake/reports/
          retention-days: 90
      - run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add datalake/
          git commit -m "MLOps: Datasets e Runbooks" || echo "Sem mudancas"
          git push
