name: SAFEDRIVER-SISTEMA-AUTONOMO
on:
  schedule:
    - cron: '0 5 * * *' 
  workflow_dispatch: 
permissions:
  contents: write

jobs:
  processamento_hibrido:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: SINCRONIZAR-REPOSITORIO
        uses: actions/checkout@v3

      - name: AMBIENTE-PYTHON
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: CARREGAR-BIBLIOTECAS
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: VALIDAR-CONTRATOS-IA
        env:
          PYTHONPATH: .
        run: pytest tests/test_contracts.py -v

      - name: EXECUTAR-MOTOR-HIBRIDO
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          PYTHONPATH: .
        run: python autobot/autobot_engine.py

      - name: PERSISTIR-DADOS-LAKEHOUSE
        run: |
          git config --global user.name "ROBO-SAFEDRIVER"
          git config --global user.email "bot@safedriver.io"
          git add datalake/*
          if ! git diff --staged --quiet; then
            git commit -m "🤖 [SISTEMA] Atualização Híbrida e Auditoria: $(date +'%Y-%m-%d')"
            git push origin main
          fi
