name: Fluxo Diario SafeDriver

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 3 * * *'

jobs:
  diagnostico_sistemas:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Inicializar Ambiente Py
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Carregar Matriz de Dependencias
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy requests firebase-admin h3 prophet xgboost scikit-learn fastparquet openpyxl
        
    - name: Executar Protocolos de Teste
      env:
        FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        DISCORD_AUDITORIA: ${{ secrets.DISCORD_AUDITORIA }}
      run: |
        pytest tests/test_contracts.py -v
