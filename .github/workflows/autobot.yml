name: SAFEDRIVER-AUTOMACAO-DIARIA
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  ciclo_operacional:
    runs-on: ubuntu-latest
    steps:
      - name: Sincronizacao de Repositorio
        uses: actions/checkout@v4

      - name: Configuracao Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalacao de Dependencias
        run: pip install pandas numpy h3 shap lightgbm google-generativeai requests openpyxl pyarrow pytest geopy

      - name: Testes de Integridade
        run: pytest tests/test_contracts.py

      - name: Execucao do Motor SafeDriver
        env:
          GEMINI_JSON: ${{ secrets.GEMINI_JSON }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: python autobot/autobot_engine.py

      - name: Persistencia de Dados e Auditoria
        run: |
          git config --global user.name "SafeDriver-Robo"
          git config --global user.email "robo@safedriver.ai"
          git add datalake/*
          git commit -m "🤖 [SISTEMA] Ciclo de Inteligencia e Recuperacao: $(date +'%Y-%m-%d')" || exit 0
          git push
