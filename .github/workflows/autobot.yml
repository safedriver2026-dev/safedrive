name: SAFE-DRIVER-SISTEMA-AUTONOMO
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  execucao_total:
    runs-on: ubuntu-latest
    steps:
      - name: BUSCAR-CODIGO
        uses: actions/checkout@v3
      - name: CONFIGURAR-PYTHON
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: INSTALAR-BIBLIOTECAS
        run: pip install pytest pandas numpy firebase-admin h3 prophet xgboost scikit-learn requests openpyxl pyarrow fastparquet
      - name: EXECUTAR-MOTOR
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          PYTHONPATH: .
        run: python autobot/autobot_engine.py
      - name: EXECUTAR-TESTES
        env:
          PYTHONPATH: .
        run: pytest tests/test_contracts.py -v
      - name: PERSISTIR-DADOS
        run: |
          git config --global user.name "SISTEMA-AUTONOMO"
          git config --global user.email "bot@safedriver.io"
          git add datalake/camada_ouro_refinada/* datalake/camada_bronze_bruta/controle.json datalake/camada_prata_confiavel/assinatura_anterior.parquet datalake/registro_sistema.log
          git commit -m "🤖 [SISTEMA] ATUALIZAÇÃO DA CAMADA OURO $(date +'%Y-%m-%d')" || exit 0
          git push
