name: Fluxo Semanal SafeDriver

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

jobs:
  sincronizacao:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar Repositorio
        uses: actions/checkout@master

      - name: Configurar Ambiente Python
        uses: actions/setup-python@master
        with:
          python-version: '3.x'

      - name: Restaurar Cache do Data Lake
        uses: actions/cache@master
        with:
          path: datalake/
          key: cache-ssp-${{ hashFiles('datalake/metadata/*.json') }}

      - name: Instalar Pacotes de Dependencia
        run: pip install -r requirements.txt

      - name: Executar Motor Preditivo de IA
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python autobot/autobot_engine.py

      - name: Salvar Data Lake no Repositorio Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add datalake/
          git commit -m "🧠 Atualizacao automatica da IA no Data Lake" || echo "Nenhum dado novo para salvar"
          git push
