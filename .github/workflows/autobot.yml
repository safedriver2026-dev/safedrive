name: SafeDriver_Global_Autonomous

on:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [ main ]

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Dependencias
        run: pip install pandas pyarrow openpyxl requests xgboost lightgbm catboost folium scikit-learn google-generativeai shap h3

      - name: Operar
        env:
          GEMINI_JSON: ${{ secrets.GEMINI_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python -c "from motor_seguranca import MotorSafeDriver; MotorSafeDriver().executar_sistema()"

      - name: Persistir
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Sistema: Atualização Diária Autônoma [skip ci]"
          file_pattern: "datalake/ouro/* controle_delta.json"
