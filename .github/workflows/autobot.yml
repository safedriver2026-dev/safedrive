name: autobot

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * 1'

jobs:
  execucao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Dependencias
        run: |
          pip install pandas pyarrow openpyxl requests xgboost lightgbm catboost folium scikit-learn google-generativeai pytest
          pip install -e .

      - name: Testes
        run: pytest tests/test_contracts.py

      - name: Processamento
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -c "from autobot.autobot_engine import MotorSafeDriver; MotorSafeDriver().gerenciar_execucao()"

      - name: Artefatos
        uses: actions/upload-artifact@v4
        with:
          name: analise_safedrive
          path: |
            datalake/camada_ouro_refinada/mapa_calor.html
            datalake/camada_ouro_refinada/relatorio_ia.txt
            datalake/camada_prata_confiavel/registro_sistema.log
