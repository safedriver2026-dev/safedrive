name: Missão Diaria SafeDriver
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT
        uses: actions/checkout@v3
      - name: SETUP-PYTHON
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Upgrade para evitar o fim do suporte
          cache: 'pip'
      - name: INSTALL-DEPS
        run: pip install pandas numpy firebase-admin h3 prophet xgboost scikit-learn requests openpyxl pyarrow fastparquet
      - name: EXECUTE-ENGINE
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          PYTHONPATH: .
        run: python autobot/autobot_engine.py
      - name: EXECUTE-TESTS
        env:
          PYTHONPATH: .
        run: pytest tests/test_contracts.py -v
      - name: GITOPS-SYNC
        run: |
          git config --global user.name "SAFE-DRIVER-BOT"
          git config --global user.email "bot@safedriver.io"
          git add datalake/gold_refined/* datalake/bronze_raw/metadados.json datalake/silver_trusted/referencia_delta.parquet datalake/logs_sistema.log
          git commit -m "🤖 [AUTO] SYNC GOLD $(date +'%Y-%m-%d')" || exit 0
          git push
