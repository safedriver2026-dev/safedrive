name: Fluxo Semanal SafeDriver
on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:
jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - run: python -m pytest tests/test_contracts.py
      - env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        run: python -m autobot.autobot_engine
      - run: |
          git config --global user.name "bot"
          git config --global user.email "bot@bot.com"
          git add datalake/
          git commit -m "Update Datasets" || echo "No changes"
          git push
