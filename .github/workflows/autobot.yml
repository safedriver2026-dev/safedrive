name: Fluxo Semanal SafeDriver

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  sincronizacao:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Restaurar cache do Data Lake
        uses: actions/cache@v4
        with:
          path: datalake/
          key: safedriver-datalake-${{ runner.os }}-${{ hashFiles('datalake/raw/*.parquet', 'datalake/metadata/*.json') }}
          restore-keys: |
            safedriver-datalake-${{ runner.os }}-
            safedriver-datalake-

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Rodar testes de contrato
        run: |
          pytest -q

      - name: Executar motor preditivo
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: |
          python autobot/autobot_engine.py

      - name: Upload de artefatos do ciclo
        uses: actions/upload-artifact@v4
        with:
          name: safedriver-semanal
          path: |
            datalake/metadata/
            datalake/refined/refined_eventos_total.parquet
            datalake/refined/refined_modelagem.parquet
            datalake/refined/malha_risco_atual.parquet
            datalake/trusted/
          if-no-files-found: warn
          retention-days: 30

      - name: Salvar Data Lake no repositorio Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add datalake/
          if git diff --cached --quiet; then
            echo "Nenhuma alteracao para commit"
          else
            git commit -m "Atualizacao automatica semanal do Data Lake SafeDriver"
            git push
          fi
