name: SafeDriver

on:
  schedule:
    - cron: '0 3 * * *'
  push:
    branches: [ main ]

jobs:
  operacao:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Sincronizar Repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Instalar Infraestrutura
        run: |
          pip install pandas pyarrow openpyxl requests xgboost lightgbm catboost folium scikit-learn google-genai shap h3
          pip install -e .

      - name: Executar Motor SafeDriver
        env:
          GEMINI_JSON: ${{ secrets.GEMINI_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
        run: python -c "from autobot.autobot_engine import MotorSafeDriver; MotorSafeDriver().gerenciar_ciclo_vida()"

      - name: Commit Datalake Parquet
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "🤖 Sistema: Sincronização Histórica (2022-2026) [skip ci]"
          file_pattern: "datalake/**/*.parquet controle_delta.json"
