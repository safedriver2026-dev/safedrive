name: SAFE-DRIVER-AUTOMATION
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  execucao:
    runs-on: ubuntu-latest
    steps:
      - name: BUSCAR-CODIGO
        uses: actions/checkout@v3
      - name: CONFIGURAR-PYTHON
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: INSTALAR-BIBLIOTECAS
        run: pip install pytest pandas numpy firebase-admin h3 prophet xgboost scikit-learn requests openpyxl pyarrow fastparquet
      - name: RODAR-MOTOR-ESTATISTICO
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }} # AGORA O SISTEMA ENXERGA ESTA CHAVE
          PYTHONPATH: .
        run: python autobot/autobot_engine.py
      - name: VALIDAR-TESTES-QUALIDADE
        env:
          PYTHONPATH: .
        run: pytest tests/test_contracts.py -v
      - name: PERSISTIR-DADOS-LAKEHOUSE
        run: |
          git config --global user.name "SISTEMA-AUTONOMO"
          git config --global user.email "bot@safedriver.io"
          git add datalake/camada_ouro_refinada/* datalake/camada_bronze_bruta/rastreio_sincronia.json datalake/camada_prata_confiavel/assinatura_anterior.parquet datalake/registro_operacional.log
          git commit -m "🤖 [SISTEMA] SINCRONIZAÇÃO REFINADA $(date +'%Y-%m-%d')" || exit 0
          git push
