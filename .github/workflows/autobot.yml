name: SAFE-DRIVER-FULL-PIPELINE
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  execucao_total:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT-REPOSITORIO
        uses: actions/checkout@v3
      - name: CONFIGURAR-PYTHON-3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: INSTALAR-DEPENDENCIAS
        run: pip install pytest pandas numpy firebase-admin h3 prophet xgboost scikit-learn requests openpyxl pyarrow fastparquet
      - name: EXECUTAR-MOTOR-MEDALLION
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          PYTHONPATH: .
        run: python autobot/autobot_engine.py
      - name: VALIDAR-CONTRATOS-DADOS
        env:
          PYTHONPATH: .
        run: pytest tests/test_contracts.py -v
      - name: PERSISTIR-GITOPS
        run: |
          git config --global user.name "SISTEMA-AUTONOMO"
          git config --global user.email "bot@safedriver.io"
          git add datalake/camada_ouro_refinada/* datalake/camada_bronze_bruta/metadados.json datalake/camada_prata_confiavel/assinatura_anterior.parquet datalake/logs_processamento.log
          git commit -m "🤖 [SISTEMA] ATUALIZAÇÃO REFINADA (DATASET 2022-2026) $(date +'%Y-%m-%d')" || exit 0
          git push
