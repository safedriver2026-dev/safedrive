name: Missao Diaria Autobot SafeDriver

on:
  push:
    branches: [ "main", "master" ]
  schedule:
    - cron: '0 3 * * *' # Acorda o Autobot às 03:00 da manhã

jobs:
  execucao_preditiva:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3

    - name: Configurar Ambiente Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Instalar Dependencias do Autobot
      run: |
        python -m pip install --upgrade pip
        pip install pytest pandas numpy requests firebase-admin h3 prophet xgboost scikit-learn fastparquet openpyxl

    - name: Executar Testes de Contrato
      env:
        FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
      run: pytest tests/test_contracts.py -v

    - name: Iniciar Motor Autobot
      env:
        FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
        DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
        DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
      run: python autobot/autobot_engine.py
