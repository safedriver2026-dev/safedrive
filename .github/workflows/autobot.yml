name: SAFE-DRIVER-SISTEMA-AUTONOMO
on:
  schedule:
    - cron: '0 5 * * *' 
  workflow_dispatch: 
permissions:
  contents: write

jobs:
  execucao_total:
    runs-on: ubuntu-latest
    steps:
      - name: BUSCAR-CODIGO
        uses: actions/checkout@v3

      - name: CONFIGURAR-PYTHON
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: INSTALAR-BIBLIOTECAS
        run: |
          python -m pip install --upgrade pip
          pip install pytest pandas numpy xgboost scikit-learn requests pyarrow fastparquet openpyxl h3 holidays

      - name: VALIDAR-CONTRATOS-DE-DADOS
        # Agora o GitHub Actions sabe exatamente onde procurar o teste!
        run: pytest tests/test_contracts.py -v

      - name: EXECUTAR-MOTOR-MEDALLION
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          PYTHONPATH: .
        # Agora ele sabe exatamente onde está o robô!
        run: python autobot/autobot_engine.py

      - name: PERSISTIR-LAKEHOUSE
        run: |
          git config --global user.name "SISTEMA-AUTONOMO-SAFEDRIVER"
          git config --global user.email "bot@safedriver.io"
          
          git add datalake/camada_bronze_bruta/*
          git add datalake/camada_prata_confiavel/*
          git add datalake/camada_ouro_refinada/*
          git add datalake/camada_ouro_refinada/esquema_estrela/*
          
          if ! git diff --staged --quiet; then
            git commit -m "🤖 [SISTEMA] DWH Atualizado: Reconstrução Medallion $(date +'%Y-%m-%d')"
            git push origin main
          else
            echo "✅ Nenhuma alteração nos dados. Lakehouse já está sincronizado."
          fi
