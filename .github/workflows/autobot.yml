name: Missão Diaria SafeDriver
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
jobs:
  run-engine:
    runs-on: ubuntu-latest
    steps:
      - name: CHECKOUT
        uses: actions/checkout@v3
      - name: PYTHON
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: DEPS
        run: pip install pandas numpy firebase-admin h3 prophet xgboost scikit-learn requests openpyxl pyarrow fastparquet
      - name: EXECUTE
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
        run: python autobot/autobot_engine.py
      - name: PERSIST
        run: |
          git config --global user.name "SAFE-DRIVER-BOT"
          git config --global user.email "bot@safedriver.io"
          git add datalake/gold_refined/*.csv datalake/bronze_raw/meta.json datalake/silver_trusted/last_run.parquet
          git commit -m "🤖 [AUTO] REFINED SYNC $(date +'%Y-%m-%d')" || exit 0
          git push
