name: Fluxo Semanal SafeDriver

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  producao:
    name: Ciclo de Inteligência Geoespacial
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Sincronizar Repositório
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Recuperar Cache do Data Lake
        uses: actions/cache@v4
        with:
          path: datalake/
          key: safedriver-storage-${{ runner.os }}-${{ hashFiles('datalake/metadata/baseline.lock') }}
          restore-keys: |
            safedriver-storage-${{ runner.os }}-

      - name: Instalar Dependências Sênior
        run: |
          pip install pandas numpy pygeohash requests firebase-admin xgboost prophet scikit-learn openpyxl pyarrow

      - name: Validar Pipeline (Testes Unitários)
        run: python -m pytest tests/test_contracts.py -q

      - name: Executar Motor Preditivo Definitivo
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python -m autobot.autobot_engine

      - name: Persistir Relatórios, Runbooks e Baseline
        run: |
          git config --global user.name "SafeDriver Core"
          git config --global user.email "core@safedriver.ia"
          git add datalake/
          git commit -m "Sistema: Ciclo Preditivo Concluído [Automático]" || echo "Sem deltas estruturais"
          git push
