name: SafeDriver Pipeline

on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:

jobs:
  auditoria_seguranca:
    name: 🛡️ Auditoria de Segurança e LGPD
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar Dependências
        run: pip install pytest polars

      - name: 🧪 Executar Testes
        env:
          PYTHONPATH: ${{ github.workspace }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: pytest tests/test_seguranca.py -v

  motor_dados:
    name: ⚙️ Processamento e Inteligência (SafeDriver)
    needs: auditoria_seguranca
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v4

      - name: 🐍 Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: 📦 Instalar Dependências
        run: pip install -r requirements.txt

      - name: 🔍 Debug: Listar Estrutura de Pastas
        # Este comando vai nos mostrar se o nome da pasta está correto (ex: autobot vs Autobot)
        run: ls -R

      - name: 🔑 Autenticação Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'

      - name: 🚀 Executar Orquestrador Principal
        env:
          PYTHONPATH: ${{ github.workspace }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: python main.py
