name: SafeDriver Execução Diaria

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      R2_ENDPOINT_URL:      ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:       ${{ secrets.R2_BUCKET_NAME }}
      DISCORD_SUCESSO:      ${{ secrets.DISCORD_SUCESSO }}
      DISCORD_ERRO:         ${{ secrets.DISCORD_ERRO }}
      BQ_PROJECT_ID:        ${{ secrets.BQ_PROJECT_ID }}
      BQ_DATASET:           ${{ secrets.BQ_DATASET }}
      BQ_CREDENTIALS_JSON:  ${{ secrets.BQ_CREDENTIALS_JSON }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: safedriver_env
          python-version: "3.10"
          auto-activate-base: false

      - name: Instalar Dependências
        shell: bash -l {0}
        run: |
          conda activate safedriver_env
          pip install --upgrade pip
          pip install \
            polars \
            pandas \
            openpyxl \
            pyarrow \
            numpy \
            boto3 \
            requests \
            urllib3 \
            google-cloud-bigquery \
            google-cloud-bigquery-storage \
            google-auth \
            db-dtypes \
            catboost \
            lightgbm \
            scikit-learn \
            shap \
            h3 \
            holidays \
            python-magic \
            joblib \
            pytest

      - name: Executar Pipeline
        shell: bash -l {0}
        run: |
          conda activate safedriver_env
          python autobot/motor_analise_preditiva.py

      - name: Testes
        shell: bash -l {0}
        run: |
          conda activate safedriver_env
          pytest tests/test_seguranca.py -v
