name: Pipeline SafeDriver
on: [push]

jobs:
  data-pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Instalar Dependencias
        run: pip install -r requirements.txt

      - name: Autenticacao Google Cloud API
        id: auth
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Executar Motor Medallion (Raw -> Prata -> Ouro)
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          GCP_BUCKET_NAME: ${{ secrets.GCP_BUCKET_NAME }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: python autobot/motor_analise_preditiva.py

      - name: Inspecao de Qualidade
        run: python -m pytest tests/test_seguranca.py
