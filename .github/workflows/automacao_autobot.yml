name: SafeDriver Workflow Incremental

on:
  schedule:
    # 1. Turno Diário (02:00 AM): Apenas a Camada Ouro (Predição)
    - cron: '0 2 * * *'
    # 2. Turno Semanal (Domingo 00:00): Bronze, Prata e Ouro (Full ETL)
    - cron: '0 0 * * 0'
  workflow_dispatch:
    inputs:
      modo:
        description: 'Escolha o modo: diario ou full'
        default: 'diario'
        required: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Deps
        run: pip install -r requirements.txt

      - name: Executar Motor SafeDriver
        env:
          PYTHONPATH: ${{ github.workspace }}
          # Segredos do R2 e GCP
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          # Lógica para definir o modo de execução
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            MODO="${{ github.event.inputs.modo }}"
          elif [ "${{ github.event.schedule }}" == "0 0 * * 0" ]; then
            MODO="full"
          else
            MODO="diario"
          fi
          
          echo "Iniciando SafeDriver em modo: $MODO"
          python -m autobot.motor_analise_preditiva $MODO
