name: SafeDriver Autobot

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      force_execution:
        description: 'Forçar reprocessamento total (Ignorar Trackers)?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  motor_safedriver:
    name: Processamento e Treinamento IA
    # ALTERAÇÃO: Agora ele procura o seu PC
    runs-on: self-hosted
    
    env:
      TZ: "America/Sao_Paulo"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      # No self-hosted, o Python já deve estar instalado no seu PC.
      # Este passo garante que a versão correta seja usada se você tiver várias.
      - name: Configuração do Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalação de Dependências
        shell: bash
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytz tzdata pytest boto3 polars pandas joblib catboost lightgbm scikit-learn shap google-cloud-bigquery

      - name: 🛡️ Execução de Testes de Segurança
        shell: bash
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          pytest tests/test_seguranca.py --maxfail=1 --disable-warnings || true

      - name: Orquestração Mestre
        shell: bash
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          if [ "${{ github.event.inputs.force_execution }}" == "true" ]; then
            echo "🔔 INICIANDO MODO: REPROCESSAMENTO TOTAL (FORCE)"
            python main.py --force
          else
            echo "⚡ INICIANDO MODO: CARGA INTELIGENTE (IDEMPOTENTE)"
            python main.py
          fi

      - name: 🏁 Encerramento do Ciclo
        if: always()
        shell: bash
        run: echo "Pipeline SafeDriver concluído com status ${{ job.status }}."
