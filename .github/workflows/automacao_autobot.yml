name: Pipeline SafeDriver

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_execution:
        description: 'Forcar reprocessamento total'
        required: false
        default: 'false'
        type: boolean

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
  BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
  BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
  BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
  DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
  DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}

jobs:
  validacao_qualidade:
    name: "01. Validacao de Seguranca"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install pytest polars pyarrow
      - run: python -m pytest tests/test_seguranca.py --maxfail=1 --disable-warnings

  processamento_bronze:
    name: "02. Ingestao Bronze"
    needs: validacao_qualidade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install polars pandas pyarrow fastexcel python-calamine boto3 botocore h3 requests urllib3
      - run: |
          python -c "from autobot.ingestao_bronze import IngestaoBronze; IngestaoBronze().executar_ingestao_continua(forcar_execucao=${{ github.event.inputs.force_execution == 'true' && 'True' || 'False' }})"

  processamento_prata:
    name: "03. Engenharia Prata"
    needs: processamento_bronze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install polars pandas pyarrow boto3 botocore h3
      - run: |
          python -c "from autobot.processamento_prata import ProcessadorPrata; ProcessadorPrata().executar_completo(forcar_execucao=${{ github.event.inputs.force_execution == 'true' && 'True' || 'False' }})"

  treinamento_ia:
    name: "04. Treinamento Preditivo"
    needs: processamento_prata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: |
          sudo apt-get install -y libgomp1
          pip install polars pandas pyarrow scikit-learn catboost lightgbm joblib boto3 botocore
      - run: |
          python -c "from autobot.treinador_ia import TreinadorModelos; TreinadorModelos().treinar_modelos()"
      - if: always()
        run: |
          echo "## Relatorio do Modelo Preditivo" >> $GITHUB_STEP_SUMMARY
          echo "Treinamento finalizado. Artefatos sincronizados com Datalake." >> $GITHUB_STEP_SUMMARY
          echo "- Data: $(date +'%d/%m/%Y %H:%M')" >> $GITHUB_STEP_SUMMARY
          echo "- Status: Operacional" >> $GITHUB_STEP_SUMMARY

  sincronizacao_ouro:
    name: "05. Sincronizacao Ouro"
    needs: treinamento_ia
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: |
          sudo apt-get install -y libgomp1
          pip install polars pandas pyarrow google-cloud-bigquery google-auth shap h3 holidays boto3 botocore catboost lightgbm joblib
      - run: |
          python -c "from autobot.ia_sincronizacao_ouro import SincronizadorOuro; SincronizadorOuro().executar_pipeline_preditivo()"

  notificacao_operacional:
    name: "06. Notificacao Discord"
    needs: [validacao_qualidade, processamento_bronze, processamento_prata, treinamento_ia, sincronizacao_ouro]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - run: pip install requests tzdata
      - env:
          STATUS_BRONZE: ${{ needs.processamento_bronze.result }}
          STATUS_PRATA: ${{ needs.processamento_prata.result }}
          STATUS_IA: ${{ needs.treinamento_ia.result }}
          STATUS_OURO: ${{ needs.sincronizacao_ouro.result }}
        run: |
          python -c "
          import os
          from autobot.comunicador import ComunicadorDiscord
          
          comunicador = ComunicadorDiscord()
          resultados = [
              ('Bronze', os.getenv('STATUS_BRONZE')),
              ('Prata', os.getenv('STATUS_PRATA')),
              ('IA', os.getenv('STATUS_IA')),
              ('Ouro', os.getenv('STATUS_OURO'))
          ]
          
          falhas = [nome for nome, status in resultados if status in ['failure', 'cancelled']]
          
          if falhas:
              comunicador.reportar_falha_critica(
                  modulo_origem='Orquestrador Nuvem', 
                  detalhes_erro=f'Falha nas etapas: {falhas}. Verifique os registos da execucao.'
              )
          else:
              estatisticas = {
                  'status_camadas': {
                      'bronze': '✅ Sucesso' if os.getenv('STATUS_BRONZE') == 'success' else '⏭️ Ignorado',
                      'prata': '✅ Sucesso' if os.getenv('STATUS_PRATA') == 'success' else '⏭️ Ignorado',
                      'ia': '✅ Sucesso' if os.getenv('STATUS_IA') == 'success' else '⏭️ Ignorado',
                      'ouro': '✅ Sucesso' if os.getenv('STATUS_OURO') == 'success' else '⏭️ Ignorado',
                  },
                  'hygiene': {
                      'taxa_recuperacao': 100, 
                      'recuperado_grade': 'Auditado', 
                      'linhas_ouro': 'Completo'
                  },
                  'metrics_ia': {'mae': 'Ver painel'},
                  'duracao': 'Concluido'
              }
              comunicador.enviar_relatorio_operacional(estatisticas)
          "
