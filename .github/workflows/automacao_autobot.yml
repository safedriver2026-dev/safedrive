name: SafeDriver Autobot Pipeline

on:
  schedule:
    - cron: '0 3 * * 1' # Bronze/Prata: Toda segunda-feira às 03:00 UTC
    - cron: '0 4 * * *' # Ouro: Todos os dias às 04:00 UTC
  workflow_dispatch:

jobs:
  bronze-silver-pipeline:
    name: Bronze and Silver Layer Processing
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 3 * * 1'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests boto3 h3-py holidays scikit-learn lightgbm catboost shap google-cloud-bigquery google-auth-oauthlib service_identity pytest

    - name: Run tests
      env:
        LGPD_SALT: ${{ secrets.LGPD_SALT }}
      run: |
        pytest tests/test_seguranca.py

    - name: Run Bronze and Silver Pipeline
      env:
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
        DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        LGPD_SALT: ${{ secrets.LGPD_SALT }}
      run: |
        python autobot/motor_analise_preditiva.py executar_pipeline_bronze_prata

  gold-pipeline:
    name: Gold Layer Daily Update
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '0 4 * * *'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests boto3 h3-py holidays scikit-learn lightgbm catboost shap google-cloud-bigquery google-auth-oauthlib service_identity pytest

    - name: Run Gold Pipeline
      env:
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
        DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        LGPD_SALT: ${{ secrets.LGPD_SALT }}
        BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
        BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
        BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
      run: |
        python autobot/motor_analise_preditiva.py executar_pipeline_ouro
