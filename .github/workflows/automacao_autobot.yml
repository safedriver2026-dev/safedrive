name: SafeDriver Autobot - Produção Inteligente

on:
  schedule:
    # Corre todos os dias às 04:00 AM (Horário UTC) para verificar o calendário
    - cron: "0 4 * * *"
  workflow_dispatch: # Permite execução manual pelo ecrã do GitHub

jobs:
  decisao_estrategica:
    runs-on: ubuntu-latest
    outputs:
      deve_rodar: ${{ steps.check.outputs.deve_rodar }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar Sensores
        run: pip install holidays pandas
        
      - name: Consultar Calendário de Risco
        id: check
        run: |
          # O script pergunta à tua classe CalendarioEstrategico se hoje é dia de 'marcha'
          RESULTADO=$(python -c "from autobot.calendario_estrategico import CalendarioEstrategico; print(CalendarioEstrategico().deve_rodar_hoje())")
          echo "deve_rodar=$RESULTADO" >> $GITHUB_OUTPUT

  execucao_pipeline:
    needs: decisao_estrategica
    # Só procede se for Domingo, Semana de Pagamento ou Véspera de Feriado
    if: needs.decisao_estrategica.outputs.deve_rodar == 'True'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      
      - name: Instalar Dependências de Produção
        run: pip install -r requirements.txt
        
      - name: Executar Ciclo Completo
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python main.py
