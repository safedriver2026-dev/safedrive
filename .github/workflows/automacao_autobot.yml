name: Autobot Execução Diaria
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  pipeline_comportamental:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Setup Infraestrutura Selenium
        run: |
          sudo apt-get update
          sudo apt-get install -y google-chrome-stable
          
      - name: Instalar Dependencias
        run: pip install -r requirements.txt
        
      - name: Motor Hibrido e Feature Engineering
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python autobot/motor_safedriver.py
          python gerador_diagramas.py
          
      - name: Testes de Integridade e Auditoria
        run: python -m pytest tests/test_seguranca.py
        
      - name: Sincronizar Datalake e Documentacao
        run: |
          git config --local user.email "bot@safedriver.com"
          git config --local user.name "SafeDriver AutoBot"
          git add datalake/auditoria/manifesto.json datalake/ouro/base_final_looker.csv documentacao/*.png
          git commit -m "auto: sazonalidade e auth hibrida [skip ci]" || echo "Sem alteracoes"
          git push
