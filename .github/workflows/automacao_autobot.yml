name: SafeDriver Execução Diaria

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run_motor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache Data
        uses: actions/cache@v4
        with:
          path: datalake/raw
          key: raw-data-${{ hashFiles('autobot/motor_analise_preditiva.py') }}
          restore-keys: |
            raw-data-

      - name: Install Dependencies
        run: |
          pip install polars pandas numpy h3 holidays boto3 catboost lightgbm scikit-learn shap requests fastexcel python-calamine pytest pyarrow

      # =========================
      # DEBUG DOS SECRETS
      # =========================
      - name: Debug Secrets
        run: |
          echo "SUCESSO LENGTH: ${#DISCORD_SUCESSO}"
          echo "ERRO LENGTH: ${#DISCORD_ERRO}"
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}

      # =========================
      # TESTE DIRETO DO WEBHOOK
      # =========================
      - name: Test Discord Webhook
        run: python -c "import os,requests;url=os.getenv('DISCORD_SUCESSO');print('Webhook carregado:',bool(url));print('Status:',requests.post(url,json={'content':'🚀 TESTE SAFE DRIVER'}).status_code if url else 'SEM URL')"
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}

      # =========================
      # EXECUÇÃO DO MOTOR
      # =========================
      - name: Execute Motor
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python -u autobot/motor_analise_preditiva.py

      # =========================
      # TESTES
      # =========================
      - name: Security Audit
        run: pytest tests/test_seguranca.py -v

      # =========================
      # FALLBACK
      # =========================
      - name: Fallback Discord
        if: failure()
        run: python -c "import os,requests;url=os.getenv('DISCORD_ERRO');requests.post(url,json={'content':'🔥 SafeDriver FALHOU'}) if url else print('Sem webhook erro')"
        env:
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
