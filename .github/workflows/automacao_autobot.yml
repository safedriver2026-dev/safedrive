name: SafeDriver Pipeline

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Instalar Dependências
        run: |
          pip install polars pandas numpy h3 fastexcel python-calamine openpyxl requests holidays scikit-learn catboost lightgbm pyarrow boto3 pytest

      - name: Executar Motor
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python -u autobot/motor_analise_preditiva.py

      - name: Executar Testes
        run: pytest tests/test_seguranca.py -v
