name: SafeDriver Autobot

on:
  schedule:
 
    - cron: "0 4 * * *"
  
  workflow_dispatch:

    inputs:
      force_execution:
        description: 'Forçar execução? (Ignora CDC, Calendário e Integridade)'
        required: true
        type: boolean
        default: false

jobs:
  pipeline_producao:
    name: Executar Pipeline
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configuração do Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' 

      - name: Instalação de Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # Garantia de resiliência caso pacotes críticos sejam removidos do requirements por engano
          pip install requests boto3 holidays h3 polars catboost lightgbm scikit-learn google-cloud-bigquery

      - name: Acionar Motor SafeDriver 
        env:
          # Credenciais Cloudflare
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          
          # Credenciais Google BigQuery
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          
          # Webhooks de Monitorização Discord e Segurança
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          if [ "${{ github.event.inputs.force_execution }}" == "true" ]; then
            echo "Aviso: Execução forçada ativada via interface do GitHub."
            python main.py --force
          else
            python main.py
          fi
