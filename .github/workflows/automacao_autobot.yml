name: Pipeline Integrado SafeDriver

on:
  schedule:
    - cron: "0 0 * * 0"
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  ingestao_semanal:
    if: github.event.schedule == '0 0 * * 0' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Executar Raw e LGPD
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_WEBHOOK_SUCESSO: ${{ secrets.DISCORD_WEBHOOK_SUCESSO }}
          DISCORD_WEBHOOK_ERRO: ${{ secrets.DISCORD_WEBHOOK_ERRO }}
        run: python main.py --weekly

  inteligencia_diaria:
    if: always()
    needs: [ingestao_semanal]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: pip install -r requirements.txt

      - name: Executar Treinamento e Ouro
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ secrets.GOOGLE_APPLICATION_CREDENTIALS }}
          DISCORD_WEBHOOK_SUCESSO: ${{ secrets.DISCORD_WEBHOOK_SUCESSO }}
          DISCORD_WEBHOOK_ERRO: ${{ secrets.DISCORD_WEBHOOK_ERRO }}
        run: python main.py --daily
