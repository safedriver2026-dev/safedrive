name: Pipeline SafeDriver Auto-Provisioning
on: [push]
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install
        run: pip install pandas numpy h3 google-cloud-storage catboost scikit-learn pyarrow requests

      - name: Auth to Google Cloud
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Run Motor (IA + Cloud Storage)
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          GCP_BUCKET_NAME: ${{ secrets.GCP_BUCKET_NAME }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ steps.auth.outputs.credentials_file_path }}
        run: python autobot/motor_analise_preditiva.py
