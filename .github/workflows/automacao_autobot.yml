name: Pipeline SafeDriver

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      force_execution:
        description: 'Forcar reprocessamento total'
        required: false
        default: 'false'

jobs:
  safedriver-pipeline:
    runs-on: ubuntu-latest 
    
    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pytest boto3 polars pyarrow h3 catboost scikit-learn requests

      - name: Execucao de Testes de Seguranca
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          python -m pytest tests/test_seguranca.py --maxfail=1 --disable-warnings

      - name: Orquestracao Mestre
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        run: |
          if [ "${{ github.event.inputs.force_execution }}" == "true" ]; then
            echo "INICIANDO MODO: REPROCESSAMENTO TOTAL (FORCE)"
            python main.py --force
          else
            echo "INICIANDO MODO: CARGA INTELIGENTE (IDEMPOTENTE)"
            python main.py
          fi
