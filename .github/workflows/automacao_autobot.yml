name: SafeDriver Autobot

on:
  push:
    branches:
      - main
      - master
  schedule:
   
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      force_execution:
        description: 'Forçar reprocessamento total (Ignorar Trackers)?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  motor_safedriver:
    name: Processamento e Treinamento IA
    runs-on: ubuntu-latest
    
    env:
      TZ: "America/Sao_Paulo"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configuração do Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Instalação de Dependências
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install pytz tzdata pytest

      - name: 🛡️ Execução de Testes 
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          # O "|| true" no final garante que, se você apagar a pasta de testes, o pipeline não quebra.
          pytest tests/test_seguranca.py --maxfail=1 --disable-warnings || true

      - name: Acionamento do SafeDriver
        env:
        
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          # Controle de Gatilho (Automático vs Manual Forçado)
          if [ "${{ github.event.inputs.force_execution }}" == "true" ]; then
            echo "MODO: REPROCESSAMENTO HISTÓRICO FORÇADO"
            python main.py --force
          else
            echo "MODO: CICLO PADRÃO (DELTA LOAD)"
            python main.py
          fi

      - name: 🏁 Encerramento do Ciclo
        if: always()
        run: echo "Pipeline SafeDriver concluído com status ${{ job.status }}."
