name: SafeDriver_Autobot_Pipeline

on:
  schedule:
    - cron: '0 3 * * *' 
  workflow_dispatch: 

jobs:
  executar-inteligencia:
    runs-on: ubuntu-latest

    env:
      # Configurações de Nuvem (Secrets)
      R2_ENDPOINT_URL:         ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:          ${{ secrets.R2_BUCKET_NAME }}
      DISCORD_SUCESSO:         ${{ secrets.DISCORD_SUCESSO }}
      DISCORD_ERRO:            ${{ secrets.DISCORD_ERRO }}
      BQ_PROJECT_ID:           ${{ secrets.BQ_PROJECT_ID }}
      BQ_DATASET_ID:           ${{ secrets.BQ_DATASET_ID }}
      BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
      LGPD_SALT:               ${{ secrets.LGPD_SALT }} 

    steps:
      - name:  Clonando Repositório
        uses: actions/checkout@v4

      - name:  Configurando Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip' 

      - name:  Instalando Dependências de Alta Performance
        run: |
          pip install --upgrade pip
          pip install polars pandas pyarrow openpyxl numpy boto3 requests \
                      google-cloud-bigquery google-auth scikit-learn \
                      catboost lightgbm h3 holidays joblib pytest

      - name:  Executando SafeDriver Autobot
        run: python autobot/motor_analise_preditiva.py

      - name:  Validando Contratos e Segurança LGPD
        run: pytest tests/test_contratos.py -v
