name: SafeDriver Pipeline Diario

on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

jobs:
  processamento_delta:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - run: pytest tests/ -v

      - env:
          ANO_PROCESSAMENTO: $(date +'%Y') 
        run: python autobot_engine.py

      - run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datalake/ouro/* geo_cache.json
          git commit -m "update data e mapa html" || echo "sem mudancas"
          git push
