name: SafeDriver Autobot

on:
  schedule:
    # Execução diária às 04:00 UTC (01:00 Horário de Brasília)
    - cron: "0 4 * * *"
  workflow_dispatch:
    # Permite a execução manual através da interface do GitHub
    inputs:
      force_execution:
        description: 'Forçar execução ignorando o calendário estratégico?'
        required: false
        type: boolean
        default: false

jobs:
  pipeline_producao:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configuração do Ambiente Python (3.11)
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip' # Otimiza o tempo de instalação nas próximas execuções

      - name: Instalação de Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Execução do Orquestrador (main.py)
        env:
          # Credenciais Cloudflare R2
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          
          # Credenciais Google Cloud / BigQuery
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          GCP_SA_JSON: ${{ secrets.GCP_SA_JSON }}
          
          # Webhooks de Monitoramento (Discord)
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: |
          if [ "${{ github.event.inputs.force_execution }}" == "true" ]; then
            python main.py --force
          else
            python main.py
          fi
