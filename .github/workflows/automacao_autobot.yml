name: SafeDriver Autobot

on:
  push:
    branches:
      - main
      - master
  schedule:
    - cron: "0 4 * * *"
  workflow_dispatch:
    inputs:
      force_execution:
        description: 'Forçar reprocessamento total (Ignorar Trackers)?'
        required: true
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  motor_safedriver:
    name: Processamento e Treinamento IA
    runs-on: self-hosted
    
    env:
      TZ: "America/Sao_Paulo"
      PYTHONPATH: ${{ github.workspace }}

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: 🛡️ Execução de Testes de Segurança
        shell: pwsh
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          C:\Users\LUCASP~1\anaconda3\envs\safedriver_env\python.exe -m pytest tests/test_seguranca.py --maxfail=1 --disable-warnings || true

      - name: Orquestração Mestre
        shell: pwsh
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          if ("${{ github.event.inputs.force_execution }}" -eq "true") {
            Write-Host "🔔 INICIANDO MODO: REPROCESSAMENTO TOTAL (FORCE)"
            C:\Users\LUCASP~1\anaconda3\envs\safedriver_env\python.exe main.py --force
          } else {
            Write-Host "⚡ INICIANDO MODO: CARGA INTELIGENTE (IDEMPOTENTE)"
            C:\Users\LUCASP~1\anaconda3\envs\safedriver_env\python.exe main.py
          }

      - name: 🏁 Encerramento do Ciclo
        if: always()
        shell: pwsh
        run: Write-Host "Pipeline SafeDriver concluído com status ${{ job.status }}."
