name: Autobot Fluxo Diario 

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Install Libs
        run: pip install -r requirements.txt
      - name: Execute Engine and Docs
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: |
          python autobot/autobot_engine.py
          python gerador_diagramas.py
          python -m pytest tests/test_contracts.py
      - name: Commit Results
        run: |
          git config --local user.email "bot@safedriver.com"
          git config --local user.name "SafeDriver Bot"
          git add datalake/ouro/* documentacao/*.png
          git commit -m "Update: Pipeline Results and Documentation [skip ci]" || echo "No changes"
          git push
