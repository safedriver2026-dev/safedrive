name: Autobot Execução Diaria
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - run: pip install -r requirements.txt
      - name: Executar Core e IA
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
        run: |
          python autobot/autobot_engine.py
          python gerador_diagramas.py
      - name: Validar Integridade
        run: python -m pytest tests/test_seguranca.py
      - name: Persistir Pipeline
        run: |
          git config --local user.email "bot@safedriver.com"
          git config --local user.name "SafeDriver Bot"
          git add datalake/* documentacao/*.png
          git commit -m "auto: mlops sync [skip ci]" || echo "Sem mudanças"
          git push
