name: SafeDriver MLOps V22
on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:
jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Motor DeltaSync e IA
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python autobot/motor_safedriver.py
          python gerador_diagramas.py
      - name: Testes de Auditoria
        run: python -m pytest tests/test_seguranca.py
      - name: Sincronizar Repositório
        run: |
          git config --local user.email "bot@safedriver.com"
          git config --local user.name "SafeDriver Bot"
          git add datalake/auditoria/manifesto.json datalake/ouro/base_final_bi.csv documentacao/*.png
          git commit -m "auto: v22 industrial integridade [skip ci]" || echo "Sem mudanças"
          git push
