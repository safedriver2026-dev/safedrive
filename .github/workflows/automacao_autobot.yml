name: Pipeline SafeDriver
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Dependencies
        run: pip install pandas numpy h3 shap lightgbm catboost scikit-learn holidays requests pyarrow calamine pytest
        
      - name: Execute Motor de Inteligência
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
        run: python motor_analise_preditiva.py
        
      - name: Run Security Tests
        run: python -m pytest tests/test_seguranca.py
        
      - name: Git Sync (Skip Large Files)
        run: |
          git config --local user.email "bot@safedriver.com"
          git config --local user.name "SafeDriver Bot"
          git add datalake/auditoria/ datalake/ouro/dashboard_risco_consolidado.csv
          git commit -m "auto: inteligência auditada [skip ci]" || echo "Nada para commitar"
          git push
