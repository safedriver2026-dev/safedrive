name: Autobot Execução Diaria

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    

    permissions:
      contents: write
    
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Instalando Dependências
        run: pip install -r requirements.txt

      - name: Execute SafeDriver Engine
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: |
          python autobot/autobot_engine.py
          python gerador_diagramas.py
          python -m pytest tests/test_contracts.py

      - name: Realizando DeltaSync
        run: |
          git config --local user.email "bot@safedriver.com"
          git config --local user.name "SafeDriver Bot"
          git add datalake/ouro/* documentacao/*.png
          git commit -m "update: delta results and diagrams [skip ci]" || echo "No changes"
          git push
