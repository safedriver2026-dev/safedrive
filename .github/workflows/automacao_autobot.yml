name: SafeDriver MLOps Pipeline

on:
  schedule:
    - cron: '0 8 * * *' # Roda todos os dias às 8h da manhã
  workflow_dispatch: # Permite rodar manualmente no botão

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Restaurar Cache do Datalake
        uses: actions/cache@v3
        with:
          path: datalake/
          key: raw-data-${{ hashFiles('autobot/motor_analise_preditiva.py') }}-${{ github.run_id }}
          restore-keys: |
            raw-data-

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install polars pandas numpy h3 holidays boto3 catboost lightgbm scikit-learn shap requests fastexcel python-calamine pytest pyarrow

      - name: Executar Motor Analítico Preditivo
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python -u autobot/motor_analise_preditiva.py

      - name: Rodar Testes de Segurança e Qualidade
        run: pytest tests/test_seguranca.py -v
