name: Pipeline SafeDriver
on: [push]
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install
        run: pip install pandas numpy h3 shap lightgbm catboost scikit-learn requests pyarrow google-cloud-storage pytest python-calamine

      - name: Run Motor IA
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
        run: python autobot/motor_analise_preditiva.py

      - name: Run Quality Tests
        run: python -m pytest tests/test_seguranca.py

      # UPLOAD PARA O GOOGLE CLOUD STORAGE
      - name: Auth to GCP
        if: success()
        uses: 'google-github-actions/auth@v1'
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Push to Cloud Bucket
        if: success()
        uses: 'google-github-actions/upload-cloud-storage@v1'
        with:
          path: 'datalake/ouro/fato_risco_real.parquet'
          destination: '${{ secrets.GCP_BUCKET_NAME }}/ouro/'

      # SINCRONIZAÇÃO DE AUDITORIA
      - name: Git Sync
        run: |
          git config --local user.email "bot@safedriver.com"
          git config --local user.name "SafeDriver Bot"
          git add datalake/auditoria/
          git commit -m "auto: audit log sync [skip ci]" || echo "Nada"
          git pull --rebase origin main
          git push
