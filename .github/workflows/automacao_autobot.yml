# .github/workflows/automacao_autobot.yml
name: SafeDriver_Motor_V1.0.0

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    env:
      R2_ENDPOINT_URL:         ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID:        ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY:    ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME:          ${{ secrets.R2_BUCKET_NAME }}
      DISCORD_SUCESSO:         ${{ secrets.DISCORD_SUCESSO }}
      DISCORD_ERRO:            ${{ secrets.DISCORD_ERRO }}
      BQ_PROJECT_ID:           ${{ secrets.BQ_PROJECT_ID }}
      BQ_DATASET_ID:           ${{ secrets.BQ_DATASET_ID }}
      BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
      LGPD_SALT:               ${{ secrets.LGPD_SALT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Sanitizar Secrets
        run: |
          echo "R2_ACCESS_KEY_ID=$(echo "$R2_ACCESS_KEY_ID" | tr -d '\n\r ')"             >> $GITHUB_ENV
          echo "R2_SECRET_ACCESS_KEY=$(echo "$R2_SECRET_ACCESS_KEY" | tr -d '\n\r ')"     >> $GITHUB_ENV
          echo "R2_ENDPOINT_URL=$(echo "$R2_ENDPOINT_URL" | tr -d '\n\r ')"               >> $GITHUB_ENV
          echo "R2_BUCKET_NAME=$(echo "$R2_BUCKET_NAME" | tr -d '\n\r ')"                 >> $GITHUB_ENV
          echo "BQ_PROJECT_ID=$(echo "$BQ_PROJECT_ID" | tr -d '\n\r ')"                   >> $GITHUB_ENV
          echo "BQ_DATASET_ID=$(echo "$BQ_DATASET_ID" | tr -d '\n\r ')"                   >> $GITHUB_ENV
          echo "LGPD_SALT=$(echo "$LGPD_SALT" | tr -d '\n\r ')"                           >> $GITHUB_ENV

      - name: Instalar Dependências
        run: |
          pip install --upgrade pip
          pip install \
            polars pandas pyarrow numpy boto3 requests urllib3 \
            google-cloud-bigquery google-cloud-bigquery-storage \
            google-auth db-dtypes catboost lightgbm scikit-learn \
            shap h3 holidays joblib pytest

      - name: Executar Pipeline
        run: python autobot/motor_analise_preditiva.py

      - name: Testes
        run: pytest tests/test_seguranca.py -v
