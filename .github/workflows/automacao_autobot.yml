name: Pipeline SafeDriver

on:
  push:
    branches:
      - main
  # Gatilho de Agendamento: Roda todos os dias as 03:00 AM (Horario de Brasilia)
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      force_execution:
        description: 'Forcar reprocessamento total'
        required: false
        default: 'false'

jobs:
  safedriver-pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do codigo
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias do sistema
        run: |
          sudo apt-get update
          sudo apt-get install -y libgomp1

      - name: Instalar dependencias do projeto
        run: |
          python -m pip install --upgrade pip
          pip install polars pandas numpy pyarrow fastexcel python-calamine matplotlib
          pip install boto3 botocore google-cloud-bigquery google-auth pandas-gbq
          pip install scikit-learn catboost lightgbm joblib shap
          pip install h3 holidays pytz tzdata
          pip install requests python-dotenv pytest folium

      - name: Execucao de Testes de Seguranca
        env:
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          python -m pytest tests/test_seguranca.py --maxfail=1 --disable-warnings

      - name: Orquestracao Mestre
        env:
          # Infraestrutura Cloudflare R2
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          
          # Infraestrutura Google BigQuery
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          
          # Seguranca e Comunicacao
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: |
          if [ "${{ github.event.inputs.force_execution }}" == "true" ]; then
            echo "INICIANDO MODO: REPROCESSAMENTO TOTAL (FORCE)"
            python main.py --force
          else
            echo "INICIANDO MODO: CARGA INTELIGENTE (IDEMPOTENTE)"
            python main.py
          fi
