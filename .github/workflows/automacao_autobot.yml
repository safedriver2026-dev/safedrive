name: SafeDriver Autobot

on:
  schedule:
    - cron: '0 3 * * 1'
  workflow_dispatch:

jobs:
  build-and-run:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas openpyxl requests boto3 h3-py holidays scikit-learn lightgbm catboost shap google-cloud-bigquery google-auth-oauthlib pytest

    - name: Run tests
      env:
        LGPD_SALT: ${{ secrets.LGPD_SALT }}
      run: |
        pytest tests/test_seguranca.py

    - name: Run SafeDriver Autobot Pipeline
      env:
        R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
        R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
        R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
        DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        LGPD_SALT: ${{ secrets.LGPD_SALT }}
        BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
        BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
        BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
      run: |
        python autobot/motor_analise_preditiva.py
