name: SafeDriver Execução Diaria

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v3

      - name: Configurar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Restaurar Cache do Datalake
        uses: actions/cache@v3
        with:
          path: datalake/
          key: raw-data-${{ hashFiles('datalake/raw/meta.json') }}
          restore-keys: |
            raw-data-

      - name: Instalar Dependências
        run: |
          pip install --upgrade pip
          pip install polars pandas numpy h3-py==4.0.0 holidays boto3 shap catboost lightgbm scikit-learn google-cloud-bigquery fastexcel

      - name: Verificar Versão do H3 (Debug)
        run: |
          python -c "import h3; print(f'Versão do h3-py instalada: {h3.__version__}')"

      - name: Executar Pipeline SafeDriver
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
        run: python -u autobot/motor_analise_preditiva.py

      - name: Rodar Testes de Segurança e Qualidade
        run: pytest tests/test_seguranca.py -v
