name: SafeDriver Atualização Diária
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - name: Instalar Dependencias
        run: pip install -r requirements.txt
      - name: Rodar Motor de Dados
        env:
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          API_KEY: ${{ secrets.API_KEY }}
        run: |
          python autobot/motor_safedriver.py
          python gerador_diagramas.py
      - name: Auditoria de Segurança
        run: python -m pytest tests/test_seguranca.py
      - name: Salvar Mudanças no Repositório
        run: |
          git config --local user.email "bot@safedriver.com"
          git config --local user.name "SafeDriver AutoBot"
          git add datalake/auditoria/*.json datalake/ouro/*.csv documentacao/*.png
          git commit -m "sincronização automática: dados auditados e limpos [skip ci]" || echo "Sem mudanças"
          git push
