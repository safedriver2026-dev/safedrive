name: Autobot Execução Diaria

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
      - run: pip install -r requirements.txt
      - env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ -v
      - run: ANO_PROCESSAMENTO=$(date +'%Y') python autobot/autobot_engine.py
      - run: python gerador_diagramas.py
      - run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datalake/ouro/* geo_cache.json *.png
          git commit -m "update: dados e diagramas" || echo "no changes"
          git push
