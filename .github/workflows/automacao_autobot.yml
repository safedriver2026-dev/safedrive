name: SafeDriver Execução Diaria

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9' # Usando Python 3.9 para melhor compatibilidade com h3-py

      - name: Instalar Dependências do Sistema (para compilação)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Instalar Bibliotecas Python
        run: |
          python -m pip install --upgrade pip
          # Instala a maioria das bibliotecas, deixando o pip resolver as versões mais recentes compatíveis
          pip install --no-cache-dir polars pandas numpy catboost lightgbm scikit-learn holidays boto3 shap google-cloud-bigquery google-auth-oauthlib fastexcel
          # Instala h3-py com versão fixa para garantir compatibilidade e forçando compilação se necessário
          pip install --no-cache-dir h3-py==3.7.6

      - name: Executar Pipeline SafeDriver
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
        run: python -u autobot/motor_analise_preditiva.py

      - name: Rodar Testes de Segurança e Qualidade
        run: pytest tests/test_seguranca.py -v
