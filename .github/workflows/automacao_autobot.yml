name: SafeDriver Execução Diaria

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v3

      - name: Configurar Python 3.11 (Versão Estável)
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Usar 3.11 para maior compatibilidade com bibliotecas

      - name: Instalar Dependências do Sistema (para compilação)
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Atualizar pip e instalar setuptools/wheel
        run: |
          python -m pip install --upgrade pip
          pip install setuptools wheel

      - name: Instalar Bibliotecas Python
        run: |
          # Instala as versões mais recentes compatíveis com Python 3.11
          # Para h3-py, forçamos a compilação do código-fonte para evitar problemas de wheel
          pip install --no-cache-dir polars pandas numpy catboost lightgbm scikit-learn holidays boto3 shap google-cloud-bigquery google-auth-oauthlib fastexcel
          pip install --no-cache-dir --no-binary :all: h3-py # h3-py instalado separadamente para forçar compilação

      - name: Verificar Versão do H3 (Debug - Opcional, pode remover depois)
        run: |
          python -c "import h3; print(f'Versão do h3-py instalada: {h3.__version__}')"

      - name: Executar Pipeline SafeDriver
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
        run: python -u autobot/motor_analise_preditiva.py

      - name: Rodar Testes de Segurança e Qualidade
        run: pytest tests/test_seguranca.py -v
