name: SafeDriver Execução Diaria

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: '3.9'
          channels: conda-forge
          activate-environment: safedriver_env
          auto-activate-base: false

      - name: Instalar Dependências do Sistema (para compilação)
        shell: bash -l {0}
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential python3-dev

      - name: Instalar Bibliotecas Python
        shell: bash -l {0}
        run: |
          conda activate safedriver_env
          python -m pip install --upgrade pip
          pip install --no-cache-dir polars pandas numpy catboost lightgbm scikit-learn holidays boto3 shap google-cloud-bigquery google-auth-oauthlib fastexcel python-magic
          conda install -c conda-forge h3-py -y # Instala h3-py via conda-forge

      - name: Executar Pipeline SafeDriver
        shell: bash -l {0}
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
        run: |
          conda activate safedriver_env
          python -u autobot/motor_analise_preditiva.py

      - name: Rodar Testes de Segurança e Qualidade
        shell: bash -l {0}
        run: |
          conda activate safedriver_env
          pytest tests/test_seguranca.py -v
