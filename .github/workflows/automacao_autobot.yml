name: Autobot Execução Diaria

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  processamento_delta:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
        
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: Executar Testes de Contrato
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python -m pytest tests/ -v

      - name: Executar Motor Preditivo
        env:
          ANO_PROCESSAMENTO: $(date +'%Y') 
        # CORREÇÃO APLICADA AQUI: Apontando para a subpasta autobot
        run: python autobot/autobot_engine.py

      - name: Commit e Push dos Dados
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add datalake/ouro/* geo_cache.json
          git commit -m "update data e mapa html" || echo "sem mudancas"
          git push
