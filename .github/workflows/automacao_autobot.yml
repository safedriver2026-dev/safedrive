name: Automacao SafeDriver

on:
  schedule:
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  execucao_pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do repositorio
        uses: actions/checkout@v3

      - name: Instalacao do Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalacao de Dependencias
        run: |
          python -m pip install --upgrade pip
          pip install pandas pyarrow numpy lightgbm catboost scikit-learn joblib h3 boto3 google-cloud-bigquery requests openpyxl

      - name: Execucao do Motor SafeDriver
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
          BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
          BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: python -m autobot.motor_analise_preditiva
