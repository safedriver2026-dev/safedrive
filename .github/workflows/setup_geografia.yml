name: "SafeDriver: Pipeline Malha Anual (Big Data)"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'O que deseja rodar?'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'bronze_rfb_trigger'
          - 'prata_anual'
          - 'tudo'
  schedule:
    # 🚀 Execução ANUAL: Todo dia 01 de Janeiro às 03:00 AM (Snapshot Basal)
    - cron: '0 3 1 1 *'

jobs:
  # --- CAMADA BRONZE: DISPARO DO EXPORT NO BIGQUERY ---
  ingestao-bronze:
    if: github.event_name == 'schedule' || github.event.inputs.job == 'bronze_rfb_trigger' || github.event.inputs.job == 'tudo'
    runs-on: ubuntu-latest
    env:
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'
          
      - name: Instalar Google Client
        run: pip install google-cloud-bigquery

      - name: Disparar SQL Export (BigQuery -> GCS)
        run: |
          echo "📨 Solicitando exportação de 171M de linhas para o GCS..."
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python autobot/bronze/malha_geo/ingestor_receita_federal.py

  # --- CAMADA PRATA: PROCESSAMENTO DOS 3.447 SHARDS (171M ROWS) ---
  build-silver:
    runs-on: ubuntu-latest
    needs: [ingestao-bronze]
    # Roda se a Bronze for sucesso OU se a Bronze for pulada (skipped)
    if: |
      always() && 
      (github.event_name == 'schedule' || github.event.inputs.job == 'prata_anual' || github.event.inputs.job == 'tudo') &&
      (needs.ingestao-bronze.result == 'success' || needs.ingestao-bronze.result == 'skipped')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Autenticar no Google Cloud (GCS Access)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'

      - name: Configurar GCloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Download Shards da Bronze (GCS -> Runner)
        run: |
          echo "📥 Baixando shards via GCloud Storage (Paralelismo Nativo)..."
          mkdir -p data_raw
          # Removido o -m: o gcloud storage já é paralelo por padrão
          gcloud storage cp "gs://safedriver/datalake/bronze/malha_raw/CNPJ_SP_HISTORICO_*.parquet" data_raw/

      - name: Instalar Motores de Processamento (Polars + DuckDB)
        run: |
          pip install polars duckdb h3 pyarrow charset-normalizer
          
      - name: Executar Prata (Streaming Mode)
        run: |
          echo "⚙️ Iniciando processamento de Big Data (Streaming Polars)..."
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python autobot/prata/malha_geografica/malha_geo_infra_social.py

      - name: Upload Camada Prata para o R2 (Egress Zero)
        run: |
          echo "📤 Subindo agregados anuais para o cofre R2..."
          aws s3 sync data_prata/ s3://$R2_BUCKET_NAME/datalake/prata/malha_geo_infra_social/ --endpoint-url $R2_ENDPOINT_URL

      - name: Notificação Discord
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MSG="✅ **[SafeDriver]** Snapshot Anual concluído! 171M de registros equalizados na Prata."
            URL="${{ secrets.DISCORD_SUCESSO }}"
          else
            MSG="🚨 **[SafeDriver]** Falha no Snapshot Anual! Verifique logs de memória ou permissões GCS."
            URL="${{ secrets.DISCORD_ERRO }}"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
