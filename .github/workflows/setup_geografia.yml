name: "Malha Geográfica"

on:
  workflow_dispatch:

jobs:
  construir-malha-base:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v3

      - name: Configurar Ambiente Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependências
        # 🚨 CONGELAMENTO DE VERSÃO AQUI (h3==3.7.6) 🚨
        run: pip install polars h3==3.7.6 requests duckdb boto3 botocore pyarrow

      - name: 📥 Baixar Malha Viária (OSM São Paulo)
        run: wget -O sao-paulo-latest.osm.pbf https://download.openstreetmap.fr/extracts/south-america/brazil/southeast/sao-paulo-latest.osm.pbf

      - name: 🛠️ Executar Processamento da Malha
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python autobot/setup_malha.py
