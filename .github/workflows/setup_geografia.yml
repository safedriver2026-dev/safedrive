name: "SafeDriver: Pipeline Multicamadas Escalável"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'O que deseja executar?'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_RECEITA'
          - 'BRONZE_CRIMES'
          - 'BRONZE_COMPLETA'
          - 'PRATA_CRIMES'    # <--- NOVO: Roda apenas a prata dos crimes
          - 'PRATA_MAPA'      # <--- NOVO: Roda apenas a prata da malha/cnae
          - 'PRATA_COMPLETA'  # <--- NOVO: Roda toda a prata
          - 'tudo'

jobs:
  # --- CAMADA BRONZE: Ingestão Pura (GCS/SSP -> R2) ---
  camada-bronze:
    if: |
      github.event.inputs.job == 'tudo' || 
      startsWith(github.event.inputs.job, 'BRONZE_')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "🔑 [AUTH] Google Cloud"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_RECEITA'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'

      - name: "📦 [BRONZE-A] Malha Receita (GCS -> R2)"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_RECEITA'
        run: |
          pip install google-cloud-storage boto3
          curl https://rclone.org/install.sh | sudo bash
          cat <<EOF > rclone.conf
          [gcs]
          type = google cloud storage
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $R2_ACCESS_KEY_ID
          secret_access_key = $R2_SECRET_ACCESS_KEY
          endpoint = $R2_ENDPOINT_URL
          EOF
          rclone --config ./rclone.conf copy gcs:safedriver/datalake/bronze/malha_raw r2:$R2_BUCKET_NAME/datalake/bronze/malha_raw -P

      - name: "📦 [BRONZE-B] Crimes SSP (Web -> R2)"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_CRIMES'
        run: |
          pip install boto3 requests
          python autobot/reg_crimes/ingestor_safe_driver.py bronze

  # --- CAMADA PRATA: Transformação e LGPD (Bronze R2 -> Prata R2) ---
  camada-prata:
    needs: [camada-bronze] 
    if: |
      always() && 
      (needs.camada-bronze.result == 'success' || needs.camada-bronze.result == 'skipped') &&
      (github.event.inputs.job == 'tudo' || startsWith(github.event.inputs.job, 'PRATA_'))
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
      LGPD_SALT: ${{ secrets.LGPD_SALT }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: "⚙️ Instalar Motores de Performance"
        run: pip install boto3 polars h3 pyarrow python-calamine fsspec

      - name: "🛡️ [PRATA-A] Processamento Crimes"
        # Executa APENAS se o input for crimes, completa ou tudo
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_COMPLETA' || github.event.inputs.job == 'PRATA_CRIMES'
        run: python autobot/reg_crimes/ingestor_safe_driver.py prata

      - name: "🏗️ [PRATA-B] Malha Geo & Infra"
        # Executa APENAS se o input for mapa, completa ou tudo
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_COMPLETA' || github.event.inputs.job == 'PRATA_MAPA'
        run: python autobot/prata/malha_geografica/malha_geo_infra_social.py

  # --- NOTIFICAÇÃO: Avalia o Pipeline Inteiro ---
  notificacao:
    needs: [camada-bronze, camada-prata]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "📢 Discord Feedback"
        run: |
          if [[ "${{ needs.camada-bronze.result }}" != "failure" && "${{ needs.camada-prata.result }}" != "failure" && "${{ needs.camada-bronze.result }}" != "cancelled" && "${{ needs.camada-prata.result }}" != "cancelled" ]]; then
            URL="${{ secrets.DISCORD_SUCESSO }}"
            MSG="✅ **[SafeDriver]** Pipeline finalizado com sucesso: ${{ github.event.inputs.job }}"
          else
            URL="${{ secrets.DISCORD_ERRO }}"
            MSG="🚨 **[SafeDriver]** Falha detectada no pipeline: ${{ github.event.inputs.job }}"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
