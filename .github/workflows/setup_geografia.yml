name: "01. Setup: Malha Mestra"

# Permite rodar manualmente pela aba "Actions" do GitHub
on:
  workflow_dispatch:

jobs:
  construir-malha:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout do Código
        uses: actions/checkout@v3

      - name: 🐍 Configurar Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        # Instalamos o H3 na versão estável 3.7.6 para evitar erros de compatibilidade
        run: |
          pip install polars h3==3.7.6 requests duckdb boto3 botocore pyarrow

      - name: 🚀 Executar Construção da Malha
        # Passamos as suas chaves do R2 e Discord como variáveis de ambiente
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
          DISCORD_ERRO: ${{ secrets.DISCORD_ERRO }}
        run: python autobot/setup_malha.py
