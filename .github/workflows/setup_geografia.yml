name: "SafeDriver: Pipeline Multicamadas Escalável"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'O que deseja executar?'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_RECEITA'
          - 'BRONZE_CRIMES'
          - 'BRONZE_COMPLETA'
          - 'PRATA_PROCESS'
          - 'tudo'

jobs:
  camada-bronze:
    if: |
      github.event.inputs.job == 'tudo' || 
      github.event.inputs.job == 'BRONZE_COMPLETA' || 
      github.event.inputs.job == 'BRONZE_RECEITA' || 
      github.event.inputs.job == 'BRONZE_CRIMES'
    runs-on: ubuntu-latest
    env:
      # PADRONIZAÇÃO: Nomes que o Python vai ler via os.getenv
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
      BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "🔑 [AUTH] Google Cloud"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_RECEITA'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'

      - name: "📦 [BRONZE-A] Ingestão Receita"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_RECEITA'
        run: |
          pip install google-cloud-bigquery google-cloud-storage boto3
          python autobot/bronze/malha_geo/ingestor_receita_federal.py check
          mkdir -p data_raw
          gcloud storage cp "gs://safedriver/datalake/bronze/malha_raw/*.parquet" data_raw/ || echo "GCS vazio"
          aws s3 sync data_raw/ s3://$R2_BUCKET_NAME/datalake/bronze/malha_raw/ --endpoint-url $R2_ENDPOINT_URL
          python autobot/bronze/malha_geo/ingestor_receita_federal.py clean

      - name: "📦 [BRONZE-B] Ingestão SSP-SP"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_CRIMES'
        env:
          LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
          LGPD_SALT: ${{ secrets.LGPD_SALT }}
        run: |
          pip install boto3 requests polars python-calamine fsspec pyarrow h3
          python autobot/reg_crimes/ingestao_crimes_bronze.py

  camada-prata:
    needs: [camada-bronze]
    if: |
      always() && 
      (github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_PROCESS') &&
      (needs.camada-bronze.result != 'failure')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
      LGPD_SALT: ${{ secrets.LGPD_SALT }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: "📥 [PRATA] Download Bronze"
        run: |
          mkdir -p data_bronze
          aws s3 sync s3://$R2_BUCKET_NAME/datalake/bronze/ data_bronze/ --endpoint-url $R2_ENDPOINT_URL

      - name: "🛡️ [PRATA] Processamento"
        run: |
          pip install boto3 polars h3 pyarrow python-calamine fsspec
          python autobot/reg_crimes/processamento_crimes_prata.py
          python autobot/prata/malha_geografica/malha_geo_infra_social.py

      - name: "📤 [PRATA] Upload Trusted"
        run: aws s3 sync data_prata/ s3://$R2_BUCKET_NAME/datalake/prata/ --endpoint-url $R2_ENDPOINT_URL

  notificacao:
    needs: [camada-prata]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "📢 Discord Feedback"
        run: |
          if [ "${{ needs.camada-prata.result }}" == "success" ]; then
            URL="${{ secrets.DISCORD_SUCESSO }}"
            MSG="✅ **[SafeDriver]** Sucesso: ${{ github.event.inputs.job }}"
          else
            URL="${{ secrets.DISCORD_ERRO }}"
            MSG="🚨 **[SafeDriver]** Erro: ${{ github.event.inputs.job }}"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
