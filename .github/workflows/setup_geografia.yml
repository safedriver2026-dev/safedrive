name: "SafeDriver: Pipeline de Produção"

on:
  schedule:
    - cron: '0 4 28 * *'
    
  workflow_dispatch:
    inputs:
      job:
        description: 'Selecione o Job para execução:'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_CRIMES'
          - 'PRATA_CRIMES'
          - 'PRATA_MAPA'
          - 'OURO_COMPLETA'
          - 'TREINAR_IA'
          - 'INTELIGENCIA_FINAL'
          - 'DEPLOY_BQ'
          - 'FLUXO_CRIMES'
          - 'tudo'

jobs:
  # --- CAMADA BRONZE ---
  camada-bronze:
    if: github.event_name == 'schedule' || contains(fromJSON('["tudo", "BRONZE_CRIMES", "FLUXO_CRIMES"]'), github.event.inputs.job)
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "📦 [BRONZE] Ingestão SSP"
        id: run_bronze
        run: |
          pip install boto3 requests polars h3 python-calamine fastexcel
          python autobot/reg_crimes/ingestor_safe_driver.py bronze

  # --- CAMADA PRATA ---
  camada-prata:
    needs: [camada-bronze]
    # O segredo é o !cancelled(): ele roda se o anterior passou OU se foi pulado
    if: always() && !cancelled() && (github.event_name == 'schedule' || contains(fromJSON('["tudo", "PRATA_CRIMES", "PRATA_MAPA", "FLUXO_CRIMES"]'), github.event.inputs.job))
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install boto3 polars h3 pyarrow requests duckdb python-calamine fastexcel
      - name: "🛡️ [PRATA-A] Crimes SSP"
        id: prata_crimes
        run: python autobot/reg_crimes/ingestor_safe_driver.py prata
      - name: "🏗️ [PRATA-B] Malha Geográfica"
        id: prata_mapa
        run: python autobot/prata/malha_geografica/malha_geo_infra_social.py

  # --- CAMADA OURO ---
  camada-ouro:
    needs: [camada-prata]
    if: always() && !cancelled() && (github.event_name == 'schedule' || contains(fromJSON('["tudo", "OURO_COMPLETA", "FLUXO_CRIMES"]'), github.event.inputs.job))
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      NOME_PROJETO: ${{ secrets.MY_PROJECT_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "🏆 [OURO] Gerar ABT"
        run: |
          pip install boto3 polars pyarrow requests
          python autobot/ouro/processador_ouro_safedriver.py

  # --- CAMADA TREINO ---
  camada-treino:
    needs: [camada-ouro]
    if: always() && !cancelled() && (github.event_name == 'schedule' || contains(fromJSON('["tudo", "TREINAR_IA", "FLUXO_CRIMES"]'), github.event.inputs.job))
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      NOME_PROJETO: ${{ secrets.MY_PROJECT_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "🧠 [TREINO] CatBoost Tweedie"
        run: |
          pip install boto3 polars pyarrow pandas catboost scikit-learn shap requests
          python autobot/ml/treinador_safe_driver.py

  # --- CAMADA INTELIGÊNCIA ---
  camada-inteligencia:
    needs: [camada-treino]
    if: always() && !cancelled() && (github.event_name == 'schedule' || contains(fromJSON('["tudo", "INTELIGENCIA_FINAL", "FLUXO_CRIMES"]'), github.event.inputs.job))
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      NOME_PROJETO: ${{ secrets.MY_PROJECT_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "🧬 [INTELIGÊNCIA] SHAP e Previsão"
        run: |
          pip install boto3 polars pyarrow pandas catboost shap requests
          python autobot/ml/gerador_inteligencia_final.py

  # --- CAMADA DEPLOY BIGQUERY ---
  camada-bigquery:
    needs: [camada-inteligencia]
    if: always() && !cancelled() && (github.event_name == 'schedule' || contains(fromJSON('["tudo", "DEPLOY_BQ", "FLUXO_CRIMES"]'), github.event.inputs.job))
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
      BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
      BQ_SERVICE_ACCOUNT_JSON: ${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}
      NOME_PROJETO: ${{ secrets.MY_PROJECT_NAME }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "🌐 [DW] Deploy BigQuery"
        run: |
          pip install boto3 polars pyarrow pandas google-cloud-bigquery db-dtypes requests
          python autobot/bq/deploy_safedriver_bq.py
