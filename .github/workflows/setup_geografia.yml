name: "SafeDriver: Pipeline Multicamadas Escalável"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'O que deseja executar?'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_RECEITA'
          - 'BRONZE_CRIMES'
          - 'BRONZE_COMPLETA'
          - 'PRATA_CRIMES'
          - 'PRATA_MAPA'
          - 'PRATA_COMPLETA'
          - 'FLUXO_CRIMES'
          - 'FLUXO_MAPA'
          - 'ORGANIZAR_PROJETO_R2'
          - 'tudo'

jobs:
  # --- CAMADA BRONZE: Ingestão Pura (GCS/SSP -> R2) ---
  camada-bronze:
    if: |
      github.event.inputs.job == 'tudo' || 
      startsWith(github.event.inputs.job, 'BRONZE_') ||
      startsWith(github.event.inputs.job, 'FLUXO_')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "🔑 [AUTH] Google Cloud"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_RECEITA' || github.event.inputs.job == 'FLUXO_MAPA'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'

      - name: "📦 [BRONZE-A] Malha Receita (GCS -> R2)"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_RECEITA' || github.event.inputs.job == 'FLUXO_MAPA'
        run: |
          pip install google-cloud-storage boto3
          curl https://rclone.org/install.sh | sudo bash
          cat <<EOF > rclone.conf
          [gcs]
          type = google cloud storage
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $R2_ACCESS_KEY_ID
          secret_access_key = $R2_SECRET_ACCESS_KEY
          endpoint = $R2_ENDPOINT_URL
          EOF
          rclone --config ./rclone.conf copy gcs:safedriver/datalake/bronze/malha_raw r2:$R2_BUCKET_NAME/datalake/bronze/malha_raw -P

      - name: "📦 [BRONZE-B] Crimes SSP (Web -> R2)"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_CRIMES' || github.event.inputs.job == 'FLUXO_CRIMES'
        run: |
          pip install boto3 requests
          python autobot/reg_crimes/ingestor_safe_driver.py bronze

  # --- CAMADA PRATA: Transformação e LGPD (Bronze R2 -> Prata R2) ---
  camada-prata:
    needs: [camada-bronze] 
    if: |
      always() && 
      (needs.camada-bronze.result == 'success' || needs.camada-bronze.result == 'skipped') &&
      (github.event.inputs.job == 'tudo' || startsWith(github.event.inputs.job, 'PRATA_') || startsWith(github.event.inputs.job, 'FLUXO_'))
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
      LGPD_SALT: ${{ secrets.LGPD_SALT }}
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: "⚙️ Instalar Motores de Performance"
        run: |
          pip install boto3 polars h3 pyarrow python-calamine fsspec requests duckdb

      - name: "🛡️ [PRATA-A] Processamento Crimes"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_COMPLETA' || github.event.inputs.job == 'PRATA_CRIMES' || github.event.inputs.job == 'FLUXO_CRIMES'
        run: python autobot/reg_crimes/ingestor_safe_driver.py prata

      - name: "🏗️ [PRATA-B] Malha Geo & Infra (Desacoplado)"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_COMPLETA' || github.event.inputs.job == 'PRATA_MAPA' || github.event.inputs.job == 'FLUXO_MAPA'
        run: |
          echo "⚙️ 1. Configurando Conexão R2..."
          curl -s https://rclone.org/install.sh | sudo bash
          cat <<EOF > rclone.conf
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $R2_ACCESS_KEY_ID
          secret_access_key = $R2_SECRET_ACCESS_KEY
          endpoint = $R2_ENDPOINT_URL
          EOF
          
          echo "📁 2. Criando Doca Local..."
          mkdir -p ./data_raw ./data_prata
          
          echo "🔎 3. Diagnosticando o Bucket (Primeiros 15 arquivos)..."
          rclone ls r2:$R2_BUCKET_NAME/ | head -n 15
          
          echo "📥 4. Download Inteligente (Busca Wildcard em todo o Bucket)..."
          rclone --config ./rclone.conf copy r2:$R2_BUCKET_NAME/ ./data_raw --include "**/SP_Faces_2022.zip" --include "**/Agregados_por_setores_basico*.csv" --include "**/CNPJ_SP_HISTORICO_LOTE_*.parquet" -P
          
          echo "🧠 5. Executando Motor de Processamento (Python)..."
          python autobot/prata/malha_geografica/malha_geo_infra_social.py
          
          echo "📤 6. Upload da Prata (Arquivos + Auditoria)..."
          rclone --config ./rclone.conf copy ./data_prata r2:$R2_BUCKET_NAME/$BQ_PROJECT_ID/datalake/prata/malhas -P

  # --- JOB DE ORGANIZAÇÃO ---
  organizacao-r2:
    if: github.event.inputs.job == 'ORGANIZAR_PROJETO_R2'
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "⚙️ Instalar Boto3"
        run: pip install boto3

      - name: "🚚 Mover Blocos para Pasta do Projeto"
        run: python autobot/organizador_r2.py

  # --- NOTIFICAÇÃO ---
  notificacao:
    needs: [camada-bronze, camada-prata, organizacao-r2]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "📢 Discord Feedback"
        run: |
          if [[ "${{ needs.camada-bronze.result }}" != "failure" && "${{ needs.camada-prata.result }}" != "failure" && "${{ needs.organizacao-r2.result }}" != "failure" && "${{ needs.camada-bronze.result }}" != "cancelled" && "${{ needs.camada-prata.result }}" != "cancelled" && "${{ needs.organizacao-r2.result }}" != "cancelled" ]]; then
            URL="${{ secrets.DISCORD_SUCESSO }}"
            MSG="✅ **[SafeDriver]** Pipeline finalizado com sucesso: ${{ github.event.inputs.job }}"
          else
            URL="${{ secrets.DISCORD_ERRO }}"
            MSG="🚨 **[SafeDriver]** Falha detectada no pipeline: ${{ github.event.inputs.job }}"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
