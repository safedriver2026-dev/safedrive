name: "SafeDriver: Pipeline Multicamadas Escalável"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'O que deseja executar?'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_RECEITA'
          - 'BRONZE_CRIMES'
          - 'BRONZE_COMPLETA'
          - 'PRATA_PROCESS'
          - 'tudo'

jobs:
  # --- CAMADA BRONZE: Ingestão Pura (GCS/SSP -> R2) ---
  camada-bronze:
    if: |
      github.event.inputs.job == 'tudo' || 
      github.event.inputs.job == 'BRONZE_COMPLETA' || 
      github.event.inputs.job == 'BRONZE_RECEITA' || 
      github.event.inputs.job == 'BRONZE_CRIMES'
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "🔑 [AUTH] Google Cloud"
        if: contains(github.event.inputs.job, 'RECEITA') || github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'

      - name: "📦 [BRONZE-A] Malha Receita (GCS -> R2)"
        if: contains(github.event.inputs.job, 'RECEITA') || github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA'
        run: |
          pip install google-cloud-storage boto3
          # Sincronização direta de Nuvem para Nuvem via rclone ou aws cli
          # Usando rclone para garantir resiliência em grandes volumes (3GB)
          curl https://rclone.org/install.sh | sudo bash
          cat <<EOF > rclone.conf
          [gcs]
          type = google cloud storage
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $R2_ACCESS_KEY_ID
          secret_access_key = $R2_SECRET_ACCESS_KEY
          endpoint = $R2_ENDPOINT_URL
          EOF
          rclone --config ./rclone.conf copy gcs:safedriver/datalake/bronze/malha_raw r2:$R2_BUCKET_NAME/datalake/bronze/malha_raw -P

      - name: "📦 [BRONZE-B] Crimes SSP (Web -> R2)"
        if: contains(github.event.inputs.job, 'CRIMES') || github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA'
        run: |
          pip install boto3 requests
          # Chama o novo script que tem o loop de retentativa inteligente
          python autobot/reg_crimes/ingestao_crimes_bronze.py

  # --- CAMADA PRATA: Transformação e LGPD (Bronze R2 -> Prata R2) ---
  camada-prata:
    # needs: [camada-bronze] -> Removido para permitir rodar Prata de forma avulsa
    if: |
      always() && 
      (github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_PROCESS')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
      LGPD_SALT: ${{ secrets.LGPD_SALT }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: "⚙️ Instalar Motores de Performance"
        run: pip install boto3 polars h3 pyarrow python-calamine fsspec

      - name: "🛡️ [PRATA] Processamento Crimes"
        # O script agora lê da Bronze no R2 e grava na Prata no R2
        run: python autobot/reg_crimes/processamento_crimes_prata.py

      - name: "🏗️ [PRATA] Malha Geo & Infra"
        # Processa os CNAEs agregando por H3 para reduzir os 3GB
        run: python autobot/prata/malha_geografica/malha_geo_infra_social.py

  notificacao:
    needs: [camada-prata]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "📢 Discord Feedback"
        run: |
          if [ "${{ needs.camada-prata.result }}" == "success" ]; then
            URL="${{ secrets.DISCORD_SUCESSO }}"
            MSG="✅ **[SafeDriver]** Pipeline finalizado: ${{ github.event.inputs.job }}"
          else
            URL="${{ secrets.DISCORD_ERRO }}"
            MSG="🚨 **[SafeDriver]** Falha no job: ${{ github.event.inputs.job }}"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
