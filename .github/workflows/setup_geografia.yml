name: "SafeDriver [01]: Ingestao Bronze (Faces, OSM Sudeste e Trajetos)"

on:
  workflow_dispatch: # Execucao manual

jobs:
  ingest_bronze:
    runs-on: ubuntu-latest
    
    env:
      # URLs das Fontes de Dados
      URL_FACES_JSON: "https://geoftp.ibge.gov.br/recortes_para_fins_estatisticos/malha_de_setores_censitarios/censo_2022/base_de_faces_de_logradouros_versao_2022_censo_demografico/json/SP_faces_de_logradouros_2022_json.zip"
      URL_OSM_SUDESTE: "https://download.geofabrik.de/south-america/brazil/sudeste-latest.osm.pbf"
      URL_TRAJETOS: "https://ftp.ibge.gov.br/Cadastro_Nacional_de_Enderecos_para_Fins_Estatisticos/Censo_Demografico_2022/Trajetos_dos_Recenseadores/35_SAO_PAULO.zip"
      
      # Secrets brutos
      R2_ENDPOINT_RAW: ${{ secrets.R2_ENDPOINT_URL }}
      R2_KEY_ID_RAW: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_RAW: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_RAW: ${{ secrets.R2_BUCKET_NAME }}

    steps:
      - name: "Checkout do Repositorio"
        uses: actions/checkout@v4

      - name: "Limpar Secrets e Configurar AWS CLI"
        run: |
          # O xargs remove espacos e caracteres invisiveis
          CLEAN_KEY=$(echo "${{ env.R2_KEY_ID_RAW }}" | xargs)
          CLEAN_SECRET=$(echo "${{ env.R2_SECRET_RAW }}" | xargs)
          CLEAN_ENDPOINT=$(echo "${{ env.R2_ENDPOINT_RAW }}" | xargs)
          CLEAN_BUCKET=$(echo "${{ env.R2_BUCKET_RAW }}" | xargs)
          
          # Configura as credenciais no runner
          aws configure set aws_access_key_id $CLEAN_KEY
          aws configure set aws_secret_access_key $CLEAN_SECRET
          aws configure set default.region auto
          
          # Grava no GITHUB_ENV para os passos seguintes
          echo "CLEAN_ENDPOINT=$CLEAN_ENDPOINT" >> $GITHUB_ENV
          echo "CLEAN_BUCKET=$CLEAN_BUCKET" >> $GITHUB_ENV

      - name: "Criar Estrutura de Dados"
        run: mkdir -p data_raw

      - name: "Ingestao: Faces de Logradouro (IBGE JSON)"
        run: wget -L "${{ env.URL_FACES_JSON }}" -O data_raw/SP_Faces_2022.zip

      - name: "Ingestao: OSM Sudeste (Geofabrik)"
        run: wget -L "${{ env.URL_OSM_SUDESTE }}" -O data_raw/sudeste-latest.osm.pbf

      - name: "Ingestao: Trajetos dos Recenseadores (IBGE)"
        run: wget -L "${{ env.URL_TRAJETOS }}" -O data_raw/35_SAO_PAULO_Trajetos.zip

      - name: "Sincronizar Bronze no R2 (malha_raw)"
        run: |
          # Aceder as variaveis via $ (shell) evita erros de validacao de contexto do GitHub
          aws s3 sync data_raw/ s3://$CLEAN_BUCKET/datalake/bronze/malha_raw/ \
          --endpoint-url $CLEAN_ENDPOINT

      - name: "Notificacao Discord"
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            WEBHOOK=$(echo "${{ secrets.DISCORD_SUCESSO }}" | xargs)
            MSG="SafeDriver Bronze Ingestao: Sucesso! Dados sincronizados no R2."
          else
            WEBHOOK=$(echo "${{ secrets.DISCORD_ERRO }}" | xargs)
            MSG="SafeDriver Bronze Ingestao: Erro detectado. Verifique os logs."
          fi
          
          if [ ! -z "$WEBHOOK" ]; then
            curl -H "Content-Type: application/json" -X POST -d "{\"content\": \"$MSG\"}" $WEBHOOK
          fi
