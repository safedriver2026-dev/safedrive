name: "SafeDriver: Pipeline de Produção"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Selecione o Job para execução:'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_RECEITA'
          - 'BRONZE_CRIMES'
          - 'BRONZE_COMPLETA'
          - 'PRATA_CRIMES'
          - 'PRATA_MAPA'
          - 'PRATA_COMPLETA'
          - 'FLUXO_CRIMES'
          - 'FLUXO_MAPA'
          - 'ORGANIZAR_PROJETO_R2'
          - 'tudo'

jobs:
  # --- CAMADA BRONZE: Ingestão Pura ---
  camada-bronze:
    if: |
      github.event.inputs.job == 'tudo' || 
      startsWith(github.event.inputs.job, 'BRONZE_') ||
      startsWith(github.event.inputs.job, 'FLUXO_')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: 🔍 Checkout do Código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "🔑 Autenticação Google Cloud (GCS)"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_RECEITA' || github.event.inputs.job == 'FLUXO_MAPA'
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'

      - name: "📦 [BRONZE-A] Malha Receita (GCS -> R2)"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_RECEITA' || github.event.inputs.job == 'FLUXO_MAPA'
        run: |
          pip install google-cloud-storage boto3
          curl -s https://rclone.org/install.sh | sudo bash
          
          # Limpeza de espaços nos secrets para evitar erros de I/O
          CLEAN_ENDPOINT=$(echo "$R2_ENDPOINT_URL" | tr -d ' \n\r\t')
          CLEAN_ACCESS=$(echo "$R2_ACCESS_KEY_ID" | tr -d ' \n\r\t')
          CLEAN_SECRET=$(echo "$R2_SECRET_ACCESS_KEY" | tr -d ' \n\r\t')
          CLEAN_BUCKET=$(echo "$R2_BUCKET_NAME" | tr -d ' \n\r\t')
          
          cat <<EOF > rclone.conf
          [gcs]
          type = google cloud storage
          [r2]
          type = s3
          provider = Cloudflare
          access_key_id = $CLEAN_ACCESS
          secret_access_key = $CLEAN_SECRET
          endpoint = $CLEAN_ENDPOINT
          EOF
          rclone --config ./rclone.conf copy gcs:safedriver/datalake/bronze/malha_raw r2:$CLEAN_BUCKET/datalake/bronze/malha_raw -P

      - name: "📦 [BRONZE-B] Crimes SSP (Web -> R2)"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_COMPLETA' || github.event.inputs.job == 'BRONZE_CRIMES' || github.event.inputs.job == 'FLUXO_CRIMES'
        run: |
          pip install boto3 requests
          python autobot/reg_crimes/ingestor_safe_driver.py bronze

  # --- CAMADA PRATA: Transformação e Auditoria ---
  camada-prata:
    needs: [camada-bronze] 
    if: |
      always() && 
      (needs.camada-bronze.result == 'success' || needs.camada-bronze.result == 'skipped') &&
      (github.event.inputs.job == 'tudo' || startsWith(github.event.inputs.job, 'PRATA_') || startsWith(github.event.inputs.job, 'FLUXO_'))
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
      LGPD_SALT: ${{ secrets.LGPD_SALT }}
    steps:
      - name: 🔍 Checkout do Código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: "⚙️ Instalar Motores de Performance"
        run: |
          pip install boto3 polars h3 pyarrow requests duckdb

      - name: "🛡️ [PRATA-A] Processamento Crimes"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_COMPLETA' || github.event.inputs.job == 'PRATA_CRIMES' || github.event.inputs.job == 'FLUXO_CRIMES'
        run: python autobot/reg_crimes/ingestor_safe_driver.py prata

      - name: "🏗️ [PRATA-B] Malha Geo & Infra (100% Python Resiliente)"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_COMPLETA' || github.event.inputs.job == 'PRATA_MAPA' || github.event.inputs.job == 'FLUXO_MAPA'
        run: |
          echo "🚀 Iniciando motor híbrido (I/O Boto3 + Compute DuckDB/Polars)..."
          python autobot/prata/malha_geografica/malha_geo_infra_social.py

  # --- JOB DE ORGANIZAÇÃO ---
  organizacao-r2:
    if: github.event.inputs.job == 'ORGANIZAR_PROJETO_R2'
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "⚙️ Instalar Dependências"
        run: pip install boto3

      - name: "🚚 Mover Blocos para Pasta do Projeto"
        run: python autobot/organizador_r2.py

  # --- NOTIFICAÇÃO ---
  notificacao:
    needs: [camada-bronze, camada-prata, organizacao-r2]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "📢 Feedback para o Discord"
        run: |
          if [[ "${{ needs.camada-bronze.result }}" != "failure" && "${{ needs.camada-prata.result }}" != "failure" && "${{ needs.organizacao-r2.result }}" != "failure" && "${{ needs.camada-bronze.result }}" != "cancelled" && "${{ needs.camada-prata.result }}" != "cancelled" && "${{ needs.organizacao-r2.result }}" != "cancelled" ]]; then
            URL="${{ secrets.DISCORD_SUCESSO }}"
            MSG="✅ **[SafeDriver]** Pipeline de Produção finalizado com sucesso: ${{ github.event.inputs.job }}"
          else
            URL="${{ secrets.DISCORD_ERRO }}"
            MSG="🚨 **[SafeDriver]** Falha detetada no pipeline: ${{ github.event.inputs.job }}"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
