name: "02. Build: Malha Mestra Consolidada"

on:
  workflow_dispatch:

jobs:
  build-malha:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: pip install polars h3==3.7.6 requests duckdb boto3 pyarrow

      - name: Download IBGE (Resiliente)
        run: |
          mkdir -p dados_ibge
          
          # Funcao para contornar erros 503 do servidor do IBGE
          download_com_retry() {
            wget --retry-connrefused --waitretry=15 --read-timeout=30 --timeout=20 --tries=15 -O $1 $2
            sleep 5
          }

          echo "Baixando Malhas 2025..."
          download_com_retry mun.zip https://geoftp.ibge.gov.br/organizacao_do_territorio/malhas_territoriais/malhas_municipais/municipio_2025/UFs/SP/SP_Municipios_2025.zip
          download_com_retry rgi.zip https://geoftp.ibge.gov.br/organizacao_do_territorio/malhas_territoriais/malhas_municipais/municipio_2025/UFs/SP/SP_RG_Imediatas_2025.zip
          download_com_retry rint.zip https://geoftp.ibge.gov.br/organizacao_do_territorio/malhas_territoriais/malhas_municipais/municipio_2025/UFs/SP/SP_RG_Intermediarias_2025.zip
          
          echo "Baixando Faces de Logradouro 2022..."
          download_com_retry faces.zip https://geoftp.ibge.gov.br/recortes_para_fins_estatisticos/malha_de_setores_censitarios/censo_2022/base_de_faces_de_logradouros_versao_2022_censo_demografico/json/SP_faces_de_logradouros_2022_json.zip
          
          unzip -o mun.zip -d dados_ibge/municipios
          unzip -o rgi.zip -d dados_ibge/imediata
          unzip -o rint.zip -d dados_ibge/intermediaria
          unzip -o faces.zip -d dados_ibge/faces

      - name: Executar Script Python
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python autobot/setup_malha_mestra.py
