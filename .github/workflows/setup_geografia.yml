name: "02. Build: Malha Mestra Consolidada"

on:
  workflow_dispatch:

jobs:
  build-malha:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: pip install polars h3==3.7.6 requests duckdb boto3 pyarrow

      - name: 🌍 Download Malhas IBGE 2025 e Faces 2022
        run: |
          mkdir -p dados_ibge
          # Malhas Administrativas 2025
          wget -O mun.zip https://geoftp.ibge.gov.br/organizacao_do_territorio/malhas_territoriais/malhas_municipais/municipio_2025/UFs/SP/SP_Municipios_2025.zip
          wget -O rgi.zip https://geoftp.ibge.gov.br/organizacao_do_territorio/malhas_territoriais/malhas_municipais/municipio_2025/UFs/SP/SP_RG_Imediatas_2025.zip
          wget -O rint.zip https://geoftp.ibge.gov.br/organizacao_do_territorio/malhas_territoriais/malhas_municipais/municipio_2025/UFs/SP/SP_RG_Intermediarias_2025.zip
          
          # LINK CORRIGIDO: Removido o sufixo que causava o 404
          wget -O faces.zip https://geoftp.ibge.gov.br/recortes_para_fins_estatisticos/malhas_territoriais/malhas_de_setores_censitarios/censo_2022/base_de_faces_de_logradouros_versao_2022/json/SP_faces_de_logradouros_2022_json.zip
          
          unzip -o mun.zip -d dados_ibge/municipios
          unzip -o rgi.zip -d dados_ibge/imediata
          unzip -o rint.zip -d dados_ibge/intermediaria
          unzip -o faces.zip -d dados_ibge/faces

      - name: 🚀 Executar Construção da Malha
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python autobot/setup_malha_mestra.py
