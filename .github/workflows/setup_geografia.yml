name: "SafeDriver: Pipeline de Produção"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Selecione o Job para execução:'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_CRIMES'
          - 'PRATA_CRIMES'
          - 'PRATA_MAPA'
          - 'OURO_COMPLETA'
          - 'TREINAR_IA'
          - 'FLUXO_CRIMES'
          - 'tudo'

jobs:
  # --- CAMADA BRONZE ---
  camada-bronze:
    if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'BRONZE_CRIMES' || github.event.inputs.job == 'FLUXO_CRIMES'
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "📦 [BRONZE] Ingestão SSP"
        id: run_bronze
        run: |
          pip install boto3 requests polars h3 python-calamine fastexcel
          python autobot/reg_crimes/ingestor_safe_driver.py bronze
      
      - name: 📢 Notificar Bronze
        if: always()
        run: |
          if [ "${{ steps.run_bronze.outcome }}" == "success" ]; then
            MSG="📦 **[Bronze]** Ingestão SSP finalizada. Dados brutos disponíveis no R2."
            URL="${{ secrets.DISCORD_SUCESSO }}"
          else
            MSG="🚨 **[Bronze]** Falha crítica na extração dos dados da SSP."
            URL="${{ secrets.DISCORD_ERRO }}"
          fi
          curl -s -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL

  # --- CAMADA PRATA ---
  camada-prata:
    needs: [camada-bronze]
    if: always() && (github.event.inputs.job == 'tudo' || contains(github.event.inputs.job, 'PRATA_') || github.event.inputs.job == 'FLUXO_CRIMES')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "⚙️ Instalar Dependências"
        run: pip install boto3 polars h3 pyarrow requests duckdb python-calamine fastexcel
      
      - name: "🛡️ [PRATA-A] Crimes SSP"
        id: prata_crimes
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_CRIMES' || github.event.inputs.job == 'FLUXO_CRIMES'
        run: python autobot/reg_crimes/ingestor_safe_driver.py prata

      - name: "🏗️ [PRATA-B] Malha Geográfica"
        id: prata_mapa
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_MAPA'
        run: python autobot/prata/malha_geografica/malha_geo_infra_social.py

      - name: 📢 Notificar Prata
        if: always()
        run: |
          if [[ "${{ steps.prata_crimes.outcome }}" == "failure" || "${{ steps.prata_mapa.outcome }}" == "failure" ]]; then
            MSG="🚨 **[Prata]** Erro no processamento de limpeza ou construção da malha."
            URL="${{ secrets.DISCORD_ERRO }}"
          else
            MSG="🥈 **[Prata]** Transformação concluída. Camada Trusted (H3 Hierárquico) atualizada."
            URL="${{ secrets.DISCORD_SUCESSO }}"
          fi
          curl -s -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL

  # --- CAMADA OURO ---
  camada-ouro:
    needs: [camada-prata]
    if: always() && (github.event.inputs.job == 'tudo' || github.event.inputs.job == 'OURO_COMPLETA' || github.event.inputs.job == 'FLUXO_CRIMES')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "🏆 [OURO] Gerar ABT"
        id: run_ouro
        run: |
          pip install boto3 polars pyarrow requests
          python autobot/ouro/processador_ouro_safedriver.py
      
      - name: 📢 Notificar Ouro
        if: always()
        run: |
          if [ "${{ steps.run_ouro.outcome }}" == "success" ]; then
            MSG="🏆 **[Ouro]** ABT Gerada. Dados prontos para treinamento (Features Geo/Sazonais ok)."
            URL="${{ secrets.DISCORD_SUCESSO }}"
          else
            MSG="🚨 **[Ouro]** Falha ao consolidar a Tabela Base Analítica."
            URL="${{ secrets.DISCORD_ERRO }}"
          fi
          curl -s -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL

  # --- CAMADA TREINO ---
  camada-treino:
    needs: [camada-ouro]
    if: always() && (github.event.inputs.job == 'tudo' || github.event.inputs.job == 'TREINAR_IA')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "🧠 [TREINO] IA e SHAP"
        id: run_treino
        run: |
          pip install boto3 polars pyarrow pandas catboost scikit-learn shap requests
          python autobot/ml/treinador_safe_driver.py
      
      - name: 📢 Notificar Treino
        if: always()
        run: |
          if [ "${{ steps.run_treino.outcome }}" == "success" ]; then
            MSG="🧠 **[Machine Learning]** Modelo CatBoost treinado e SHAP Values exportados."
            URL="${{ secrets.DISCORD_SUCESSO }}"
          else
            MSG="🚨 **[Machine Learning]** Erro durante o treinamento ou geração de explicabilidade."
            URL="${{ secrets.DISCORD_ERRO }}"
          fi
          curl -s -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
