name: "SafeDriver: Pipeline Camada Prata"

on:
  workflow_dispatch: # Permite rodar manualmente
  push:
    branches:
      - main
    paths:
      - 'scripts/malha_geo_infra_social.py'

jobs:
  build-and-run:
    runs-on: ubuntu-latest
    
    # Definição de permissões para segurança do GITHUB_TOKEN
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Atualizado para evitar depreciação do Google

      - name: Autenticar no Google Cloud (BigQuery)
        uses: google-github-actions/auth@v2
        with:
          # A sua Secret com o JSON da Service Account
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'

      - name: Instalar Dependências de Engenharia
        run: |
          pip install --upgrade pip
          pip install boto3 polars duckdb h3 geopandas shapely pyarrow zstandard \
                      google-cloud-bigquery google-cloud-bigquery-storage \
                      charset-normalizer pandas db-dtypes

      - name: Executar Pipeline de Engenharia de Dados (Camada Prata)
        env:
          # 🔐 SEGURANÇA: Injeção das chaves via Secrets (Nada de hardcoded!)
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          BQ_PROJECT_ID: "safe-driver-fc3a9" # ID do seu projeto corrigido
          LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }} # A sua "Pimenta" para o Hash
        run: |
          # Garante que o Python encontra os módulos
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python scripts/processar_prata.py

      - name: Notificar Sucesso no Discord (Opcional)
        if: success()
        run: |
          curl -X POST -H "Content-Type: application/json" \
          -d '{"content": "🚀 **SafeDriver**: Camada Prata processada e blindada com sucesso no R2!"}' \
          ${{ secrets.DISCORD_WEBHOOK }}
