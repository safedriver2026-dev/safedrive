name: "SafeDriver: Pipeline de Produção"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Selecione o Job para execução:'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_CRIMES'
          - 'PRATA_CRIMES'
          - 'PRATA_MAPA'
          - 'OURO_COMPLETA'
          - 'TREINAR_IA'
          - 'FLUXO_CRIMES' # Bronze -> Prata -> Ouro (Crimes)
          - 'tudo'

jobs:
  # --- CAMADA BRONZE ---
  camada-bronze:
    if: |
      github.event.inputs.job == 'tudo' || 
      github.event.inputs.job == 'BRONZE_CRIMES' || 
      github.event.inputs.job == 'FLUXO_CRIMES'
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "📦 [BRONZE] Ingestão SSP"
        run: |
          pip install boto3 requests polars h3 python-calamine fastexcel
          python autobot/reg_crimes/ingestor_safe_driver.py bronze

  # --- CAMADA PRATA ---
  camada-prata:
    needs: [camada-bronze]
    if: |
      always() &&
      (github.event.inputs.job == 'tudo' || contains(github.event.inputs.job, 'PRATA_') || github.event.inputs.job == 'FLUXO_CRIMES')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "⚙️ Instalar Dependências"
        run: pip install boto3 polars h3 pyarrow requests duckdb python-calamine fastexcel
      
      - name: "🛡️ [PRATA-A] Crimes SSP"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_CRIMES' || github.event.inputs.job == 'FLUXO_CRIMES'
        run: python autobot/reg_crimes/ingestor_safe_driver.py prata

      - name: "🏗️ [PRATA-B] Malha Geográfica"
        if: github.event.inputs.job == 'tudo' || github.event.inputs.job == 'PRATA_MAPA'
        run: python autobot/prata/malha_geografica/malha_geo_infra_social.py

  # --- CAMADA OURO ---
  camada-ouro:
    needs: [camada-prata]
    if: |
      always() &&
      (github.event.inputs.job == 'tudo' || github.event.inputs.job == 'OURO_COMPLETA' || github.event.inputs.job == 'FLUXO_CRIMES')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "🏆 [OURO] Gerar ABT"
        run: |
          pip install boto3 polars pyarrow requests
          python autobot/ouro/processador_ouro_safedriver.py

  # --- CAMADA TREINO ---
  camada-treino:
    needs: [camada-ouro]
    if: |
      always() &&
      (github.event.inputs.job == 'tudo' || github.event.inputs.job == 'TREINAR_IA')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
    steps:
      - name: 🔍 Checkout
        uses: actions/checkout@v4
      - name: 🐍 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "🧠 [TREINO] IA e SHAP"
        run: |
          pip install boto3 polars pyarrow pandas catboost scikit-learn shap requests
          python autobot/ml/treinador_safe_driver.py

  # --- NOTIFICAÇÃO FINAL ---
  notificacao:
    needs: [camada-bronze, camada-prata, camada-ouro, camada-treino]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "📢 Feedback Discord"
        run: |
          # Checa se algum dos jobs que DEVERIA rodar falhou
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            URL="${{ secrets.DISCORD_ERRO }}"
            MSG="🚨 **[SafeDriver]** Falha no Job: \`${{ github.event.inputs.job }}\`"
          else
            URL="${{ secrets.DISCORD_SUCESSO }}"
            MSG="✅ **[SafeDriver]** Sucesso no Job: \`${{ github.event.inputs.job }}\`"
          fi
          curl -s -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
