name: "SafeDriver: Pipeline Malha"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'O que deseja rodar?'
        required: true
        default: 'prata'
        type: choice
        options:
          - 'bronze_rfb'
          - 'prata'
          - 'tudo'
  schedule:
    # Roda automaticamente todo dia 15 do mês, às 03:00 da manhã (Arquitetura Custo Zero)
    - cron: '0 3 15 * *'

jobs:
  # --- CAMADA BRONZE (INGESTÃO VIA BIGQUERY) ---
  ingestao-bronze:
    # Roda se for agendado (cron) OU se escolhido manualmente no workflow_dispatch
    if: github.event_name == 'schedule' || github.event.inputs.job == 'bronze_rfb' || github.event.inputs.job == 'tudo'
    runs-on: ubuntu-latest
    env:
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "auto"
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
      LGPD_SALT: ${{ secrets.LGPD_SALT }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Autenticar no Google Cloud (BigQuery)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'
          
      - name: Instalar Dependências Bronze
        run: |
          pip install --upgrade pip
          pip install polars boto3 pyarrow google-cloud-bigquery pandas db-dtypes
          
      - name: Ingestão Oficial RFB (BigQuery API)
        run: |
          echo "🚀 Iniciando extração otimizada do BigQuery..."
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python autobot/bronze/malha_geo/ingestor_receita_federal.py

  # --- CAMADA PRATA (PROCESSAMENTO) ---
  build-silver:
    runs-on: ubuntu-latest
    needs: [ingestao-bronze]
    # Roda se for agendado OU se escolhido manualmente, DESDE QUE a Bronze não tenha falhado
    if: |
      always() && 
      (github.event_name == 'schedule' || github.event.inputs.job == 'prata' || github.event.inputs.job == 'tudo') &&
      (needs.ingestao-bronze.result == 'success' || needs.ingestao-bronze.result == 'skipped')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "auto"
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'
          
      - name: Download Camada Bronze (R2)
        run: |
          echo "📥 Sincronizando arquivos da Bronze para processamento..."
          aws s3 sync s3://$R2_BUCKET_NAME/datalake/bronze/malha_raw/ data_raw/ --endpoint-url $R2_ENDPOINT_URL

      - name: Instalar Dependências e Rodar Prata
        run: |
          pip install --upgrade pip
          pip install polars duckdb h3 geopandas shapely pyarrow google-cloud-bigquery pandas db-dtypes requests charset-normalizer
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python autobot/prata/malha_geografica/malha_geo_infra_social.py

      - name: Upload Camada Prata (R2)
        run: |
          echo "🚀 Subindo resultados para a Prata no R2..."
          aws s3 sync data_prata/ s3://$R2_BUCKET_NAME/datalake/prata/malha_geo_infra_social/ --endpoint-url $R2_ENDPOINT_URL

      - name: Notificação Final
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MSG="✅ **[SafeDriver]** Pipeline finalizada com sucesso! Prata atualizada no R2."
            URL="${{ secrets.DISCORD_SUCESSO }}"
          else
            MSG="🚨 **[SafeDriver]** Erro crítico na Pipeline!"
            URL="${{ secrets.DISCORD_ERRO }}"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
