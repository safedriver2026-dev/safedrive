name: "SafeDriver: Pipeline Malha"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'O que deseja rodar?'
        required: true
        default: 'prata'
        type: choice
        options:
          - 'bronze_rfb'
          - 'prata'
          - 'tudo'

jobs:
  # --- CAMADA BRONZE (INGESTÃO) ---
  ingestao-bronze:
    if: github.event.inputs.job == 'bronze_rfb' || github.event.inputs.job == 'tudo'
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "auto"
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
      LGPD_SALT: ${{ secrets.LGPD_SALT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Ingestão Oficial RFB
        run: |
          echo "📥 Baixando dados da Receita Federal..."
          wget https://arquivos.receitafederal.gov.br/dados/cnpj/dados_abertos_cnpj/2024-04/Estabelecimentos0.zip
          unzip Estabelecimentos0.zip
          mv *.ESTABELE* dados_rfb.csv
          pip install polars boto3 pyarrow requests
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python autobot/bronze/malha_geo/ingestor_receita_federal.py

  # --- CAMADA PRATA (PROCESSAMENTO) ---
  build-silver:
    runs-on: ubuntu-latest
    needs: [ingestao-bronze]
    # Este 'if' garante que o job rode se selecionado, idependente se o anterior foi pulado
    if: |
      always() && 
      (github.event.inputs.job == 'prata' || github.event.inputs.job == 'tudo') &&
      (needs.ingestao-bronze.result == 'success' || needs.ingestao-bronze.result == 'skipped')
    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      AWS_DEFAULT_REGION: "auto"
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
      LGPD_SALT: ${{ secrets.LGPD_SALT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Autenticar no Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'
          
      - name: Download Camada Bronze (R2)
        run: |
          echo "📥 Sincronizando arquivos da Bronze para processamento..."
          aws s3 sync s3://$R2_BUCKET_NAME/datalake/bronze/malha_raw/ data_raw/ --endpoint-url $R2_ENDPOINT_URL

      - name: Instalar Dependências e Rodar Prata
        run: |
          pip install polars duckdb h3 geopandas shapely pyarrow google-cloud-bigquery pandas db-dtypes requests charset-normalizer
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python autobot/prata/malha_geografica/malha_geo_infra_social.py

      - name: Upload Camada Prata (R2)
        run: |
          echo "🚀 Subindo resultados para a Prata no R2..."
          aws s3 sync data_prata/ s3://$R2_BUCKET_NAME/datalake/prata/malha_geo_infra_social/ --endpoint-url $R2_ENDPOINT_URL

      - name: Notificação Final
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            MSG="✅ **[SafeDriver]** Pipeline Prata concluída com sucesso!"
            URL="${{ secrets.DISCORD_SUCESSO }}"
          else
            MSG="🚨 **[SafeDriver]** Erro crítico na Pipeline Prata!"
            URL="${{ secrets.DISCORD_ERRO }}"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
