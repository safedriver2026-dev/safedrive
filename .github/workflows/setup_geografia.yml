name: "SafeDriver: Processamento Prata (ZSTD + H3)"

on:
  workflow_dispatch:

env:
  R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
  R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
  R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
  R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}

jobs:
  build-silver:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar Dependencias
        run: pip install boto3 polars duckdb h3 geopandas shapely pyarrow zstandard

      - name: Executar Arquitetura Prata
        run: python autobot/prata/malha_geografica/malha_geo_infra_social/build_prata_mestre.py
