name: "SafeDriver: Pipeline de Produção"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Selecione o Job para execução:'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_CRIMES'
          - 'BRONZE_COMPLETA'
          - 'PRATA_CRIMES'
          - 'PRATA_MAPA'
          - 'PRATA_COMPLETA'
          - 'OURO_COMPLETA'
          - 'TREINAR_IA'
          - 'FLUXO_CRIMES'
          - 'FLUXO_MAPA'
          - 'tudo'

jobs:
  # --- CAMADA BRONZE: Ingestão Pura ---
  camada-bronze:
    if: |
      github.event.inputs.job == 'tudo' || 
      startsWith(github.event.inputs.job, 'BRONZE_') ||
      startsWith(github.event.inputs.job, 'FLUXO_')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: 🔍 Checkout do Código
        uses: actions/checkout@v4
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "📦 [BRONZE] Crimes SSP"
        run: |
          pip install boto3 requests polars h3 python-calamine fastexcel
          python autobot/reg_crimes/ingestor_safe_driver.py bronze

  # --- CAMADA PRATA: Transformação e Auditoria ---
  camada-prata:
    needs: [camada-bronze]
    if: |
      always() && 
      (needs.camada-bronze.result == 'success' || needs.camada-bronze.result == 'skipped') &&
      (github.event.inputs.job == 'tudo' || startsWith(github.event.inputs.job, 'PRATA_') || startsWith(github.event.inputs.job, 'FLUXO_'))
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
    steps:
      - name: 🔍 Checkout do Código
        uses: actions/checkout@v4
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "⚙️ Instalar Motores de Performance"
        run: pip install boto3 polars h3 pyarrow requests duckdb python-calamine fastexcel
      - name: "🛡️ [PRATA] Processamento e Malha"
        run: |
          python autobot/reg_crimes/ingestor_safe_driver.py prata
          python autobot/prata/malha_geografica/malha_geo_infra_social.py

  # --- CAMADA OURO: Tabela Base Analítica (ABT) ---
  camada-ouro:
    needs: [camada-prata]
    if: |
      always() && 
      (needs.camada-prata.result == 'success' || needs.camada-prata.result == 'skipped') &&
      (github.event.inputs.job == 'tudo' || github.event.inputs.job == 'OURO_COMPLETA')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - name: 🔍 Checkout do Código
        uses: actions/checkout@v4
      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: "🏆 [OURO] Gerar ABT"
        run: |
          pip install boto3 polars pyarrow
          python autobot/ouro/processador_ouro_safedriver.py

 # --- TREINAMENTO DE IA: CatBoost & SHAP ---
  camada-treino:
    needs: [camada-ouro]
    if: |
      always() && 
      (needs.camada-ouro.result == 'success' || needs.camada-ouro.result == 'skipped') &&
      (github.event.inputs.job == 'tudo' || github.event.inputs.job == 'TREINAR_IA')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      DISCORD_SUCESSO: ${{ secrets.DISCORD_SUCESSO }}
    steps:
      - name: 🔍 Checkout do Código
        uses: actions/checkout@v4

      - name: 🐍 Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: "⚙️ Instalar Bibliotecas de IA"
        run: |
          # ADICIONADO PYARROW AQUI
          pip install boto3 polars pyarrow pandas catboost scikit-learn shap requests

      - name: "🧠 [TREINO] Executar Treinador e SHAP"
        run: python autobot/ml/treinador_safe_driver.py
  # --- NOTIFICAÇÃO ---
  notificacao:
    needs: [camada-bronze, camada-prata, camada-ouro, camada-treino]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "📢 Feedback para o Discord"
        run: |
          B_RES="${{ needs.camada-bronze.result }}"
          P_RES="${{ needs.camada-prata.result }}"
          O_RES="${{ needs.camada-ouro.result }}"
          T_RES="${{ needs.camada-treino.result }}"
          
          # Se os jobs que deveriam rodar terminaram bem (ou foram pulados por escolha do usuário)
          if [[ ($B_RES == "success" || $B_RES == "skipped") && \
                ($P_RES == "success" || $P_RES == "skipped") && \
                ($O_RES == "success" || $O_RES == "skipped") && \
                ($T_RES == "success" || $T_RES == "skipped") ]]; then
            URL="${{ secrets.DISCORD_SUCESSO }}"
            STATUS="✅ SUCESSO"
          else
            URL="${{ secrets.DISCORD_ERRO }}"
            STATUS="🚨 FALHA"
          fi
          
          MSG="$STATUS **[SafeDriver]** Job: \`${{ github.event.inputs.job }}\` finalizado."
          curl -s -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
