name: "SafeDriver: Pipeline Multicamadas (Bronze & Prata)"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Qual etapa você deseja monitorar/executar?'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE_RECEITA'    # BigQuery -> R2
          - 'BRONZE_CRIMES'     # Web -> R2
          - 'PRATA_PROCESS'     # Bronze -> Processamento -> Prata
          - 'TUDO'
  schedule:
    - cron: '0 0 1 1 *'

jobs:
  # ==========================================================
  # CAMADA BRONZE: CAPTURA E ARMAZENAMENTO DO DADO CRU (RAW)
  # ==========================================================
  camada-bronze:
    if: |
      github.event_name == 'schedule' || 
      github.event.inputs.job == 'BRONZE_RECEITA' || 
      github.event.inputs.job == 'BRONZE_CRIMES' || 
      github.event.inputs.job == 'TUDO'
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- ETAPA A: RECEITA FEDERAL (BIG DATA) ---
      - name: "[BRONZE-A] Autenticar e Disparar BigQuery"
        if: github.event.inputs.job == 'BRONZE_RECEITA' || github.event.inputs.job == 'TUDO'
        run: |
          pip install google-cloud-bigquery google-cloud-storage boto3
          python autobot/bronze/malha_geo/ingestor_receita_federal.py check

      - name: "[BRONZE-A] Sincronizar Shards: GCS -> R2 (Cofre)"
        if: github.event.inputs.job == 'BRONZE_RECEITA' || github.event.inputs.job == 'TUDO'
        run: |
          mkdir -p data_raw
          gcloud storage cp "gs://safedriver/datalake/bronze/malha_raw/*.parquet" data_raw/ || echo "GCS vazio"
          aws s3 sync data_raw/ s3://$R2_BUCKET_NAME/datalake/bronze/malha_raw/ --endpoint-url $R2_ENDPOINT_URL

      # --- ETAPA B: CRIMES (SSP / PRF) ---
      - name: "[BRONZE-B] Ingestão Web: SSP-SP e PRF -> R2"
        if: github.event.inputs.job == 'BRONZE_CRIMES' || github.event.inputs.job == 'TUDO'
        run: |
          pip install boto3 requests polars h3 calamine
          python autobot/malha_geo/ingestao_crimes_bronze.py

  # ==========================================================
  # CAMADA PRATA: TRANSFORMAÇÃO E REFINAMENTO (TRUSTED)
  # ==========================================================
  camada-prata:
    needs: [camada-bronze]
    if: |
      always() && 
      (github.event_name == 'schedule' || github.event.inputs.job == 'PRATA_PROCESS' || github.event.inputs.job == 'TUDO') &&
      (needs.camada-bronze.result != 'failure')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # --- ETAPA DE TRANSFERÊNCIA INTER-CAMADAS ---
      - name: "[PRATA] Transferência: Baixando da Bronze (R2) para o Runner"
        run: |
          echo "Preparando ambiente para processar 171M de linhas..."
          mkdir -p data_raw
          aws s3 sync s3://$R2_BUCKET_NAME/datalake/bronze/malha_raw/ data_raw/ --endpoint-url $R2_ENDPOINT_URL

      # --- ETAPA DE PROCESSAMENTO ---
      - name: "[PRATA] Motor Polars: Executando Enriquecimento Geo e H3"
        run: |
          pip install polars duckdb h3 pyarrow
          python autobot/prata/malha_geografica/malha_geo_infra_social.py

      # --- ETAPA DE CARGA FINAL ---
      - name: "[PRATA] Upload: Salvando Dado Confiável (Trusted) no R2"
        run: |
          aws s3 sync data_prata/ s3://$R2_BUCKET_NAME/datalake/prata/malha_geo_infra_social/ --endpoint-url $R2_ENDPOINT_URL

  # ==========================================================
  # NOTIFICAÇÕES (FEEDBACK FINAL)
  # ==========================================================
  notificacao:
    needs: [camada-prata]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "[FIM] Notificar Discord/Status"
        run: |
          echo "Pipeline finalizado com sucesso. Camadas Bronze e Prata atualizadas."
