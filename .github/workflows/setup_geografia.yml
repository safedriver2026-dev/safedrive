name: "SafeDriver: Camada Prata Malha"

on:
  workflow_dispatch: # Permite execução manual pelo painel do GitHub

jobs:
  build-silver:
    runs-on: ubuntu-latest
    
    # Define o ambiente com as variáveis secretas
    env:
      # Cloudflare R2
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      
      # BigQuery & Segurança (LGPD Compliance)
      BQ_PROJECT_ID: "safe-driver-fc3a9"
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}

    steps:
      - name: Checkout do Repositório
        uses: actions/checkout@v4

      - name: Configurar Ambiente Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Versão atualizada para evitar avisos do Google

      - name: Autenticar no Google Cloud (BigQuery)
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}'

      - name: Instalar Dependências de Engenharia
        run: |
          pip install --upgrade pip
          pip install boto3 polars duckdb h3 geopandas shapely pyarrow zstandard \
                      google-cloud-bigquery google-cloud-bigquery-storage \
                      charset-normalizer pandas db-dtypes

      - name: Executar Pipeline Camada Prata
        run: |
          # Define o PYTHONPATH para garantir que o Python encontra os teus módulos internos
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          
          # 🚀 CAMINHO CORRIGIDO: Apontando para a pasta real do teu projeto
          python autobot/prata/malha_geografica/malha_geo_infra_social.py

      # --- NOTIFICAÇÕES DE OBSERVABILIDADE ---
      
      - name: Notificar Falha no Discord
        if: failure()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "🚨 **[SafeDriver] FALHA CRÍTICA:** A pipeline da Camada Prata falhou. Lucas, verifica os logs no GitHub Actions!"}' \
          ${{ secrets.DISCORD_ERRO }}

      - name: Notificar Sucesso no Discord
        if: success()
        run: |
          curl -H "Content-Type: application/json" \
          -d '{"content": "✅ **[SafeDriver] SUCESSO:** Camada Prata processada, pseudonimizada (Salt+Pepper) e guardada no R2."}' \
          ${{ secrets.DISCORD_SUCESSO }}
