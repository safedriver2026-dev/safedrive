name: "SafeDriver: Pipeline Multicamadas Escalável"

on:
  workflow_dispatch:
    inputs:
      job:
        description: 'Selecione a etapa ou o módulo:'
        required: true
        default: 'tudo'
        type: choice
        options:
          - 'BRONZE'         # Ingestão Raw (Receita + Crimes)
          - 'PRATA'          # Processamento Trusted (LGPD + H3)
          - 'tudo'
  schedule:
    - cron: '0 0 1 * *'

jobs:
  # ==========================================================
  # 1. CAMADA BRONZE: INGESTÃO DE DADOS CRUS (RAW)
  # ==========================================================
  camada-bronze:
    if: contains(fromJSON('["BRONZE", "tudo"]'), github.event.inputs.job) || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    env:
      BQ_PROJECT_ID: ${{ secrets.BQ_PROJECT_ID }}
      BQ_DATASET_ID: ${{ secrets.BQ_DATASET_ID }}
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }

      # --- ETAPA A: RECEITA FEDERAL ---
      - name: "[BRONZE-A] Ingestão Receita Federal (GCS -> R2)"
        run: |
          pip install google-cloud-bigquery google-cloud-storage boto3
          python autobot/bronze/malha_geo/ingestor_receita_federal.py check
          mkdir -p data_raw
          gcloud storage cp "gs://safedriver/datalake/bronze/malha_raw/*.parquet" data_raw/ || echo "Vazio"
          aws s3 sync data_raw/ s3://$R2_BUCKET_NAME/datalake/bronze/malha_raw/ --endpoint-url $R2_ENDPOINT_URL
          python autobot/bronze/malha_geo/ingestor_receita_federal.py clean
        uses: google-github-actions/auth@v2
        with: { credentials_json: '${{ secrets.BQ_SERVICE_ACCOUNT_JSON }}' }

      # --- ETAPA B: CRIMES ---
      - name: "[BRONZE-B] Ingestão SSP-SP (Web -> R2 Raw)"
        run: |
          pip install boto3 requests polars python-calamine
          python autobot/reg_crimes/ingestao_crimes_bronze.py

  # ==========================================================
  # 2. CAMADA PRATA: TRANSFORMAÇÃO E LGPD (TRUSTED)
  # ==========================================================
  camada-prata:
    needs: [camada-bronze]
    if: |
      always() && 
      contains(fromJSON('["PRATA", "tudo"]'), github.event.inputs.job) &&
      (needs.camada-bronze.result != 'failure')
    runs-on: ubuntu-latest
    env:
      R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
      R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
      LGPD_PEPPER: ${{ secrets.LGPD_PEPPER }}
      LGPD_SALT: ${{ secrets.LGPD_SALT }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.11' }
      
      - name: "[PRATA] Sincronizar Bronze para o Runner"
        run: |
          mkdir -p data_bronze
          aws s3 sync s3://$R2_BUCKET_NAME/datalake/bronze/ data_bronze/ --endpoint-url $R2_ENDPOINT_URL

      - name: "[PRATA] Processamento Crimes (Anonimização + H3)"
        run: |
          pip install boto3 polars h3 pyarrow python-calamine fsspec
          python autobot/reg_crimes/processamento_crimes_prata.py

      - name: "[PRATA] Processamento Malha e Infra Social"
        run: |
          pip install polars duckdb h3 pyarrow
          python autobot/prata/malha_geografica/malha_geo_infra_social.py

      - name: "[PRATA] Upload Trusted -> R2"
        run: aws s3 sync data_prata/ s3://$R2_BUCKET_NAME/datalake/prata/ --endpoint-url $R2_ENDPOINT_URL

  # ==========================================================
  # 3. NOTIFICAÇÃO
  # ==========================================================
  notificacao:
    needs: [camada-prata]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: "[FIM] Enviar Feedback ao Discord"
        run: |
          if [ "${{ needs.camada-prata.result }}" == "success" ]; then
            MSG="✅ **[SafeDriver]** Pipeline concluído! Bronze capturada e Prata protegida (LGPD)."
            URL="${{ secrets.DISCORD_SUCESSO }}"
          else
            MSG="🚨 **[SafeDriver]** Falha detectada. Verifique os logs do GitHub Actions."
            URL="${{ secrets.DISCORD_ERRO }}"
          fi
          curl -H "Content-Type: application/json" -d "{\"content\": \"$MSG\"}" $URL
