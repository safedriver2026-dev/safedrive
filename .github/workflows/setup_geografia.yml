name: "SafeDriver: Sincronização da Camada Bronze"

on:
  schedule:
    - cron: "0 0 1 * *" # Roda todo dia 1º do mês
  workflow_dispatch: # Permite rodar manualmente

jobs:
  # ---------------------------------------------------
  # 1. JOB GEOGRAFIA (IBGE)
  # ---------------------------------------------------
  sincronizar_geografia:
    name: "Sincronização: Malha Geográfica"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
      
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'
          
      - name: Instalar Dependências
        run: pip install polars duckdb boto3 h3 requests
        
      - name: Executar Ingestão Geográfica
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python autobot/ingest_geo.py

  # ---------------------------------------------------
  # 2. JOB INFRAESTRUTURA (OSM)
  # ---------------------------------------------------
  sincronizar_infra:
    name: "Sincronização: Infraestrutura (OSM)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar Dependências
        run: pip install polars duckdb boto3 h3 requests
        
      - name: Executar Ingestão de Infraestrutura
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python autobot/ingest_infra.py

  # ---------------------------------------------------
  # 3. JOB POPULAÇÃO (CENSO)
  # ---------------------------------------------------
  sincronizar_populacao:
    name: "Sincronização: Populacional (Censo)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4
        
      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instalar Dependências
        run: pip install polars duckdb boto3 h3 requests
        
      - name: Executar Ingestão Populacional
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: python autobot/ingest_pop.py
