name: "02. Build: Dimensões Geográficas"

on:
  workflow_dispatch:

jobs:
  construir-dimensoes:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v3

      - name: 🐍 Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 📦 Instalar Dependências
        run: pip install polars h3==3.7.6 requests duckdb boto3 botocore pyarrow

      - name: 🌍 Baixar Mapa OSM
        run: wget -O sao-paulo-latest.osm.pbf https://download.geofabrik.de/south-america/brazil/sao-paulo-latest.osm.pbf

      - name: 🚀 Executar Dimensões
        env:
          R2_ENDPOINT_URL: ${{ secrets.R2_ENDPOINT_URL }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
        run: |
          python autobot/setup_cidades.py
          python autobot/setup_bairros.py
          python autobot/setup_logradouros.py
