name: Teste de Eficiencia SafeDriver

on: [push, workflow_dispatch]

jobs:
  validacao:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install pandas numpy xgboost prophet pyarrow fastparquet scikit-learn

      - name: Execute Validacao
        run: python valida_tcc.py

      - name: Upload Report
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-final-2025
          path: validacao_motores_2025.txt
