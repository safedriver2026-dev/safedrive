name: Pipeline de Teste de Eficiencia

on: [push, workflow_dispatch]

jobs:
  validacao_tecnica:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Instalar Dependências
        run: pip install pandas numpy xgboost prophet pyarrow fastparquet scikit-learn
      - name: Rodar Teste de Stress
        run: python valida_motores.py
      - name: Exportar Resultado para Download
        uses: actions/upload-artifact@v4
        with:
          name: veredito-motores-2025
          path: validacao_testes_2025.txt
