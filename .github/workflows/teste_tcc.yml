name: Teste de Eficiência TCC

on: [push, workflow_dispatch]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          
      - name: Instala dependencias
        run: |
          pip install pandas numpy xgboost prophet pyarrow fastparquet scikit-learn
          
      - name: Roda Teste de Eficiência
        run: python valida_tcc.py
